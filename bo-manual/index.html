<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOタスク</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23334155'/><text x='16' y='23' text-anchor='middle' font-family='Inter,sans-serif' font-weight='700' font-size='20' fill='white'>N</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margi:0;padding:0}
    :root{
      --bg:#ffffff;--bg-muted:#f1f5f9;--bg-card:#ffffff;
      --fg:#1e293b;--fg-muted:#64748b;--fg-muted2:#94a3b8;
      --primary:#334155;--primary-light:#f1f5f9;--primary-fg:#1e293b;
      --accent:#2563eb;
      --border:#e2e8f0;--border-light:#f1f5f9;
      --destructive:#ef4444;
      --radius:0.5rem;
      --sidebar-w:260px;
      --font: 'Inter', 'Noto Sans JP', system-ui, sans-serif;
    }
    html{font-size:14px;scroll-behavior:smooth}
    body{font-family:var(--font);background:var(--bg);color:var(--fg);line-height:1.6;min-height:100vh}
    a{color:var(--accent);text-decoration:none}
    button{font-family:inherit;cursor:pointer;border:none;background:none}
    /* Layout */
    .app{display:flex;min-height:100vh}
    .sidebar{width:var(--sidebar-w);border-right:1px solid var(--border);background:var(--bg);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:40;transition:transform .2s}
    .sidebar-header{height:56px;display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:1px solid var(--border-light)}
    .sidebar-header svg{width:20px;height:20px;color:var(--primary)}
    .sidebar-header h2{font-size:15px;font-weight:600;color:var(--fg)}
    .sidebar-nav{padding:8px}
    .sidebar-section-label{font-size:11px;font-weight:600;color:var(--fg-muted2);text-transform:uppercase;letter-spacing:0.05em;padding:16px 12px 8px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);font-size:13px;font-weight:500;color:var(--fg-muted);transition:all .15s;width:100%;text-align:left}
    .nav-item:hover{background:var(--bg-muted);color:var(--fg)}
    .nav-item.active{background:var(--primary-light);color:var(--primary-fg)}
    .nav-item svg{width:16px;height:16px;flex-shrink:0}
    .main-area{margin-left:var(--sidebar-w);flex:1;padding:24px 32px;min-height:100vh}
    /* Cards */
    .card{border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-card);overflow:hidden;transition:all .15s}
    .card:hover{border-color:rgba(51,65,85,.3);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-delete-btn{opacity:0;pointer-events:none;transition:opacity .2s}
.card.show-delete .card-delete-btn{opacity:1;pointer-events:auto}

    .card-header{padding:16px 20px 8px}
    .card-body{padding:8px 20px 16px}
    .card-title{font-size:14px;font-weight:600;color:var(--fg);word-break:break-word;overflow-wrap:break-word}
    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;transition:all .15s}
    .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#1e293b}
    .btn-outline{border:1px solid var(--border);background:var(--bg);color:var(--fg)}.btn-outline:hover{background:var(--bg-muted)}
    .btn-ghost{color:var(--fg-muted)}.btn-ghost:hover{background:var(--bg-muted);color:var(--fg)}
    .btn-destructive{background:var(--destructive);color:#fff}.btn-destructive:hover{background:#dc2626}
    .btn-sm{padding:5px 12px;font-size:12px}
    .btn-icon{padding:6px;border-radius:var(--radius)}
    /* Badge */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:500}
    .badge-secondary{background:var(--bg-muted);color:var(--fg-muted)}
    .badge-outline{border:1px solid var(--border);color:var(--fg-muted)}
    .badge-primary{background:var(--primary-light);color:var(--primary-fg)}
    /* Grid */
    .grid{display:grid;gap:16px}
    .grid-3{grid-template-columns:repeat(auto-fill,minmax(min(280px,100%),1fr))}
    .grid-2{grid-template-columns:repeat(auto-fill,minmax(min(340px,100%),1fr))}
    /* Page header */
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .page-title{font-size:22px;font-weight:600;letter-spacing:-0.02em}
    /* Input */
    .input,.textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;transition:border-color .15s;background:var(--bg);color:var(--fg)}
    .input:focus,.textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(51,65,85,.1)}
    .textarea{resize:vertical;min-height:80px}
    .label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--fg)}
    .label-icon{display:inline-flex;align-items:center;gap:6px}
    /* Purpose highlight */
    .purpose-box{background:rgba(37,99,235,.04);border:1px solid rgba(37,99,235,.1);border-radius:var(--radius);padding:12px 16px}
    .purpose-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--primary);margin-bottom:4px}
    /* Info card sections */
    .info-card{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:24px}
    .info-section{padding:10px 14px}
    .pace-radio{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border:1px solid var(--border);border-radius:14px;font-size:12px;cursor:pointer;background:#fff}
    .pace-radio input{margin:0}
    .pace-radio:has(input:checked){border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
    .pace-day{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border:1px solid var(--border);border-radius:50%;font-size:12px;cursor:pointer;user-select:none;background:#fff}
    .pace-day.on{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:600}
    .info-section + .info-section{border-top:1px solid var(--border)}
    .info-section-label{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--fg-muted);margin-bottom:8px}
    .info-section-label svg{width:14px;height:14px}
    .info-grid{display:grid;grid-template-columns:1fr 1fr}
    .info-grid > div{padding:16px 20px}
    .info-grid > div + div{border-left:1px solid var(--border)}
    /* Dialog / Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
    .manual-list-row:hover{background:var(--bg-muted)!important}
    /* Mobile-only sticky action bar (hidden on desktop where .doc-meta shows them) */
    .doc-actions-mobile{display:none}
    /* Google Docs-style version history */
    .gdocs-history-overlay{position:fixed;inset:0;background:#f6f8fc;z-index:200;display:flex;animation:modalIn .15s}
    .gdocs-history-panel{display:flex;flex-direction:column;width:100%;height:100%}
    .gdocs-history-header{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #dadce0;background:#fff;height:56px;flex-shrink:0}
    .gdocs-history-back{border:none;background:transparent;cursor:pointer;padding:8px;border-radius:50%;color:#5f6368;display:flex;align-items:center;justify-content:center}
    .gdocs-history-back:hover{background:rgba(95,99,104,.1)}
    .gdocs-history-title{font-size:18px;font-weight:500;color:#202124;flex:1}
    .gdocs-history-actions{display:flex;gap:8px}
    .gdocs-history-body{display:flex;flex:1;overflow:hidden;min-height:0}
    .gdocs-history-preview{flex:1;overflow-y:auto;padding:40px;background:#fff;border-right:1px solid #dadce0;min-width:0}
    .gdocs-preview-inner{max-width:820px;margin:0 auto}
    .gdocs-preview-stamp{font-size:12px;color:#5f6368;margin-bottom:16px;font-weight:500}
    .gdocs-preview-title{font-size:28px;font-weight:600;color:#202124;margin-bottom:24px;line-height:1.2}
    .gdocs-preview-field{margin-bottom:24px}
    .gdocs-preview-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#5f6368;margin-bottom:6px}
    .gdocs-history-list{width:320px;flex-shrink:0;overflow-y:auto;background:#fff;padding:12px 0}
    .gdocs-history-day{padding:0}
    .gdocs-history-day-label{font-size:11px;font-weight:600;color:#5f6368;padding:12px 20px 6px;letter-spacing:.02em}
    .gdocs-history-item{padding:10px 20px;cursor:pointer;border-left:3px solid transparent;transition:background .08s}
    .gdocs-history-item:hover{background:#f1f3f4}
    .gdocs-history-item.selected{background:#e8f0fe;border-left-color:#1a73e8}
    .gdocs-history-item-time{font-size:13px;font-weight:500;color:#202124}
    .gdocs-history-item-meta{font-size:11px;color:#5f6368;margin-top:4px;display:flex;align-items:center;gap:8px}
    .gdocs-history-badge{background:#f1f3f4;color:#5f6368;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:500}
    .gdocs-history-badge.current{background:#e8f0fe;color:#1a73e8}
    .gdocs-history-badge.backup{background:#fef7e0;color:#b06000}
    .gdocs-history-item-chars{color:#80868b}
    @media(max-width:720px){
      .gdocs-history-body{flex-direction:column-reverse}
      .gdocs-history-list{width:100%;max-height:40vh;border-top:1px solid #dadce0}
      .gdocs-history-preview{padding:20px}
      .gdocs-preview-title{font-size:22px}
    }
    .modal{background:var(--bg);border-radius:12px;padding:24px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:modalIn .2s}
    @keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
    .modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
    .modal .form-group{margin-bottom:16px}
    /* Toast */
    .toast-container{position:fixed;bottom:20px;right:20px;z-index:200}
    .toast{padding:12px 20px;border-radius:var(--radius);background:#1e293b;color:#f8fafc;font-size:13px;margin-top:8px;animation:toastIn .3s;box-shadow:0 4px 12px rgba(0,0,0,.2)}
    @keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    /* MindMap */
    .mindmap-viewport{position:relative;width:100%;overflow:auto;border:1px solid rgba(226,232,240,.3);border-radius:var(--radius);background:var(--bg-muted);min-height:calc(100vh - 160px);cursor:grab}
    .mindmap-viewport:active{cursor:grabbing}
    .mindmap-svg{position:absolute;top:0;left:0;pointer-events:none;z-index:1;transform-origin:top left}
    .mindmap-inner{display:flex;align-items:flex-start;gap:24px;padding:32px;min-width:max-content;transform-origin:top left;transition:transform .15s ease;position:relative;z-index:2}
    .node-root{padding:10px 20px;border-radius:12px;background:linear-gradient(135deg,#1e293b,#334155);color:#fff;font-weight:600;font-size:13px;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.15);user-select:none}
    .node-user{padding:8px 16px;border-radius:8px;font-weight:500;font-size:13px;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
    .node-user:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .node-project{padding:6px 14px;border-radius:8px;font-weight:500;font-size:13px;border:1px solid;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
    .node-project:hover{transform:scale(1.05)}
    .node-manual{padding:8px 12px;border-radius:8px;background:#fff;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:all .15s;max-width:280px;min-width:100px;word-break:break-word;overflow-wrap:break-word}
    .node-manual:hover{border-color:rgba(37,99,235,.3);box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .node-manual-title{font-size:13px;font-weight:500}
    .node-manual-purpose{font-size:11px;color:var(--fg-muted);margin-top:4px;display:flex;align-items:flex-start;gap:4px}
    .node-manual-purpose svg{width:12px;height:12px;color:var(--primary);flex-shrink:0;margin-top:2px}
    .user-col{display:flex;flex-direction:column;gap:12px}
    .project-row{display:flex;align-items:flex-start;gap:24px}
    .manuals-col{display:flex;flex-direction:column;gap:8px}
    .node-project-standalone{padding:8px 16px;border-radius:8px;font-weight:500;font-size:13px;border:2px solid #334155;background:#f1f5f9;color:#1e293b;cursor:pointer;transition:all .15s;white-space:normal;user-select:none;word-break:break-word;overflow-wrap:anywhere;max-width:220px;line-height:1.35}
    .node-project-standalone:hover{transform:scale(1.05);box-shadow:0 2px 8px rgba(30,41,59,.15)}
    .node-project-standalone[draggable="true"],.node-manual[draggable="true"],.node-root[draggable]{cursor:grab}
    .node-project-standalone[draggable="true"]:active,.node-manual[draggable="true"]:active{cursor:grabbing}
    .drop-target{outline:3px dashed #2563eb!important;outline-offset:4px;background:rgba(37,99,235,.08)!important}
    .drop-before{box-shadow:0 -3px 0 0 #2563eb!important}
    .drop-after{box-shadow:0 3px 0 0 #2563eb!important}
    .dragging-source{opacity:.4}
    .project-col{display:flex;flex-direction:column;gap:12px}
    .project-branch{display:flex;align-items:flex-start;gap:16px}
    .project-items-col{display:flex;flex-direction:column;gap:8px}
        /* Map branch add options */
    .map-add-options{display:flex;gap:6px;margin-top:6px}
    .map-add-branch{padding:5px 12px;border-radius:14px;font-size:11px;font-weight:500;border:1px dashed var(--border);background:transparent;color:var(--fg-muted);cursor:pointer;transition:all .2s;white-space:nowrap}
    .map-add-branch:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)} .sub-tree-row{display:flex;align-items:flex-start;gap:12px;position:relative;flex-shrink:0} .sub-tree-card-wrap{display:flex;flex-direction:column;align-items:flex-start;gap:2px;min-width:120px} .sub-tree-children{display:flex;flex-direction:column;gap:8px} .sub-add-btn{font-size:10px;padding:2px 8px;border:1px dashed var(--border);border-radius:4px;background:transparent;cursor:pointer;white-space:nowrap;color:var(--fg-muted)} .sub-add-btn:hover{border-color:var(--primary);color:var(--primary)}
    /* Hover-reveal add buttons on the map.
       IMPORTANT: layout must NOT shift on hover — otherwise cards jump down
       and the user can't read them comfortably. Keep the button slot at a
       constant size and animate only opacity (and pointer-events). */
    .map-add-plus, .sub-add-plus, .map-add-btn-plus {
      width:20px;height:20px;min-height:20px;line-height:1;padding:0;font-size:14px;font-weight:600;
      display:inline-flex;align-items:center;justify-content:center;
      border:1px dashed var(--border);border-radius:50%;background:transparent;color:var(--fg-muted);
      cursor:pointer;opacity:0;pointer-events:none;transition:opacity .15s ease, color .15s, border-color .15s;
      flex-shrink:0;
    }
    .map-add-plus:hover, .sub-add-plus:hover, .map-add-btn-plus:hover { color: var(--primary); border-color: var(--primary); background: var(--primary-light) }
    .project-branch:hover .map-add-plus,
    .sub-tree-row:hover > .sub-tree-children > .sub-add-plus,
    .root-wrap:hover > .map-add-btn-plus,
    .map-add-plus.open, .sub-add-plus.open, .map-add-btn-plus.open { opacity: 1; pointer-events: auto }
    /* Touch devices: no hover, always show the + (dim) so mobile users can tap */
    @media (hover: none) {
      .map-add-plus, .sub-add-plus, .map-add-btn-plus { opacity: .5; pointer-events: auto }
    }
    /* Add-options popup (tap + → 3 choices) */
    .add-popup{position:absolute;z-index:60;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.12);padding:4px;display:flex;flex-direction:column;min-width:140px}
    .add-popup button{background:transparent;border:none;text-align:left;padding:8px 12px;border-radius:4px;cursor:pointer;font-size:13px;color:var(--fg);display:flex;align-items:center;gap:8px}
    .add-popup button:hover{background:var(--bg-muted)}
    /* Project detail */
    .project-memo-area{margin-top:24px}
    .project-memo-area h3{font-size:15px;font-weight:600;margin-bottom:8px}
    .memo-toolbar{display:flex;gap:4px;padding:6px 8px;background:var(--bg-muted);border:1px solid var(--border);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;flex-wrap:wrap;align-items:center}
    .memo-toolbar.sticky{position:sticky;top:0;z-index:20;background:var(--bg-muted);box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .color-popup{position:absolute;background:#fff;border:1px solid var(--border);border-radius:6px;padding:6px;box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:100;display:flex;gap:4px;flex-wrap:wrap;width:160px}
    .color-swatch{width:22px;height:22px;border-radius:4px;cursor:pointer;border:1px solid rgba(0,0,0,.1)}
    .color-swatch:hover{transform:scale(1.1)}
    /* Block hover delete (blockquote, callout, code, copy, collapse, details) */
    .manual-rich-editor blockquote,.memo-rich-editor blockquote{position:relative;cursor:text}
    .manual-rich-editor .callout,.memo-rich-editor .callout,.manual-rich-editor details,.memo-rich-editor details{position:relative}
    .bq-delete,.block-delete{position:absolute;top:4px;right:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:var(--destructive);color:#fff;border:none;border-radius:50%;font-size:14px;font-weight:700;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .15s;z-index:3;line-height:1;padding:0}
    .manual-rich-editor blockquote:hover .bq-delete,.memo-rich-editor blockquote:hover .bq-delete,
    .manual-rich-editor .callout:hover > .block-delete,.memo-rich-editor .callout:hover > .block-delete,
    .manual-rich-editor pre.code-block:hover > .block-delete,.memo-rich-editor pre.code-block:hover > .block-delete,
    .manual-rich-editor .copy-block:hover > .block-delete,.memo-rich-editor .copy-block:hover > .block-delete,
    .manual-rich-editor details:hover > .block-delete,.memo-rich-editor details:hover > .block-delete{opacity:1;pointer-events:auto}
    .bq-delete:hover,.block-delete:hover{background:#dc2626}
    /* When both copy button and delete button present, offset copy button to the left */
    .copy-block:has(.block-delete) .copy-block-btn,pre.code-block:has(.block-delete) .code-block-btn{right:40px}
    .memo-toolbar-btn{padding:4px 8px;font-size:12px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--fg);cursor:pointer;transition:all .15s;font-weight:500;line-height:1.4}
    .memo-toolbar-btn:hover{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
    .memo-toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
    .memo-rich-editor a{color:var(--primary);text-decoration:underline;cursor:pointer}
    .memo-rich-editor a:hover{opacity:.7}
    .memo-rich-editor{width:100%;height:calc(100vh - 180px);max-height:calc(100vh - 180px);padding:16px;border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);font-family:var(--font);font-size:14px;line-height:1.8;background:var(--bg);outline:none;overflow-y:auto;white-space:pre-wrap;word-wrap:break-word;resize:vertical}
    .memo-rich-editor:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
    .memo-rich-editor:empty::before{content:attr(data-placeholder);color:var(--fg-muted);pointer-events:none}
    .memo-rich-editor h1{font-size:24px;font-weight:700;margin:12px 0 6px;padding-bottom:6px;border-bottom:2px solid var(--border)}
    .memo-rich-editor h2{font-size:18px;font-weight:600;margin:10px 0 4px;padding:6px 12px;border-left:4px solid var(--primary);background:rgba(37,99,235,.06);border-radius:0 4px 4px 0}
    .memo-rich-editor h3{font-size:15px;font-weight:600;margin:8px 0 4px}
    .memo-rich-editor p{margin:4px 0}
    .memo-rich-editor strong{font-weight:700}
    .memo-rich-editor em{font-style:italic}
    .memo-rich-editor ul,.memo-rich-editor ol{margin:6px 0;padding-left:24px}
    .memo-rich-editor li{margin:2px 0}
    .memo-rich-editor code{background:var(--bg-muted);padding:2px 6px;border-radius:3px;font-family:'SFMono-Regular',Consolas,monospace;font-size:13px}
    .memo-rich-editor pre{background:var(--bg-muted);padding:12px;border-radius:var(--radius);overflow-x:auto;margin:8px 0}
    .memo-rich-editor pre code{background:none;padding:0}
    .memo-rich-editor blockquote{border-left:3px solid var(--primary);padding:4px 12px;margin:8px 0;color:var(--fg-muted);background:var(--bg-muted);border-radius:0 var(--radius) var(--radius) 0}
    .memo-rich-editor a{color:var(--primary);text-decoration:underline}
    .memo-rich-editor hr{border:none;border-top:1px solid var(--border);margin:12px 0}

/* Calendar */
.cal-wrap{margin-bottom:16px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-header h3{font-size:14px;font-weight:600}
.cal-header button{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg-muted);color:var(--fg)}
.cal-header button:hover{background:var(--border)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-dow{font-size:10px;color:var(--fg-muted2);padding:4px 0;font-weight:500}
.cal-day{font-size:12px;padding:6px 0;border-radius:6px;cursor:pointer;position:relative;color:var(--fg-muted)}

.cal-day.selected{background:#334155;color:#fff;font-weight:600}
.cal-day.has-tasks::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#334155}

/* Daily tasks */
.daily-task{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border-light);cursor:pointer}
.daily-task:last-child{border-bottom:none}
.daily-task .dt-check{width:22px;height:22px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}

.daily-task .dt-title{font-size:13px;flex:1;min-width:0}
.daily-task .dt-title.done{text-decoration:line-through;opacity:.5}
.daily-add{display:flex;align-items:center;gap:8px;padding:8px 4px;color:var(--fg-muted);font-size:13px;cursor:pointer}
.daily-add:hover{color:var(--fg)}
/* Sync */
.sync-bar{display:flex;gap:8px;margin-top:12px}
.sync-bar button{flex:1}
.overlay-backdrop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
.overlay-panel{background:#fff;border-radius:16px;transition:transform .2s ease;padding:24px 24px 32px;width:100%;max-width:600px;max-height:70vh;overflow-y:auto;animation:slideUp .3s ease;box-shadow:0 -4px 20px rgba(0,0,0,.15)}

.overlay-panel .overlay-type{font-size:12px;color:var(--fg-muted);margin-bottom:4px}
.overlay-panel .overlay-actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
.overlay-panel .overlay-action-btn{display:flex;align-items:center;gap:8px;padding:12px 24px;border-radius:var(--radius);font-size:14px;cursor:pointer;border:1px solid var(--border);background:#fff;transition:all .2s}
.overlay-panel .overlay-action-btn:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.overlay-panel .overlay-action-btn:active{transform:scale(.93);transition:transform .1s}

.overlay-panel .overlay-action-btn.check{background:#059669;color:#fff;border-color:#059669}
.overlay-panel .overlay-action-btn.check:hover{background:#047857}
.overlay-panel .overlay-action-btn.delete{background:#fff;color:var(--destructive);border-color:var(--destructive)}
.overlay-panel .overlay-action-btn.delete:hover{background:#fef2f2}

.overlay-panel .overlay-action-btn.add:hover{background:#1d4ed8}
.overlay-panel .overlay-children{margin-top:16px}
.overlay-panel .overlay-child{padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;transition:all .2s ease;cursor:pointer}
.overlay-panel .overlay-child:hover{background:var(--bg-muted);transform:translateX(4px);transition:all .2s ease}

.goal-large-title:hover,.goal-mid-title:hover,.goal-small-title:hover{transform:translateX(3px);transition:transform .2s ease}

    /* Code textbox (Notion-style) */
      .code-textbox-wrapper {
        position: relative;
        background: #f7f6f3;
        border-radius: 4px;
        padding: 32px 12px 12px 12px;
        margin: 4px 0;
        font-family: 'SFMono-Regular', Menlo, Consolas, 'PT Mono', 'Liberation Mono', Courier, monospace;
      }
      .code-textbox {
        width: 100%;
        min-height: 60px;
        background: transparent;
        border: none;
        outline: none;
        font-family: inherit;
        font-size: 13px;
        line-height: 1.5;
        color: #37352f;

        padding: 0;
      }
      .code-textbox::placeholder {
        color: #b4b4b0;
      }

        position: absolute;
        top: 6px;
        right: 8px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        font-size: 12px;
        color: #9b9a97;
        background: transparent;
        border: none;
        border-radius: 3px;
        cursor: pointer;

      }

        width: 14px;
        height: 14px;
        fill: currentColor;
        flex-shrink: 0;
      }
      .code-textbox-copy-btn.copied {
        color: #2eaadc;
      }

        position: absolute;
        top: 6px;
        left: 8px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        font-size: 12px;
        color: #9b9a97;
        background: transparent;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .code-textbox-delete-btn:hover {
        background: rgba(235, 87, 87, 0.08);
        color: #eb5757;
      }
      .code-textbox-delete-btn svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
        flex-shrink: 0;

      /* Block copy buttons */
    .copyable-block{position:relative}
    /* Copy message block (rich-text with copy button) */
    .copy-block{position:relative;border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin:12px 0;background:var(--bg);line-height:1.7}
    .copy-block-body{outline:none;white-space:pre-wrap;word-wrap:break-word;min-height:1em}
    .copy-block-body:empty::before{content:'メッセージを入力…';color:var(--fg-muted2)}
    .copy-block-btn,.code-block-btn{position:absolute;top:8px;right:8px;display:flex;align-items:center;gap:4px;padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--fg-muted);cursor:pointer;opacity:0;pointer-events:none;transition:opacity .15s;z-index:2;white-space:nowrap;line-height:1.2}
    .copy-block:hover .copy-block-btn,pre.code-block:hover .code-block-btn{opacity:1;pointer-events:auto}
    .copy-block-btn:hover,.code-block-btn:hover{background:var(--bg-muted);color:var(--fg)}
    .copy-block-btn.copied,.code-block-btn.copied{background:#16a34a;border-color:#16a34a;color:#fff;opacity:1}
    .copy-block-btn svg,.code-block-btn svg{width:12px;height:12px;fill:currentColor}
    .copyable-block .block-copy-btn{position:absolute;top:4px;right:4px;display:flex;align-items:center;gap:3px;padding:3px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--fg-muted);cursor:pointer;opacity:0;transition:opacity .15s;z-index:10;white-space:nowrap}
    .copyable-block:hover .block-copy-btn{opacity:1}
    .block-copy-btn:hover{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
    .block-copy-btn svg{width:12px;height:12px;fill:currentColor}
    .block-copy-btn.copied{background:#16a34a;border-color:#16a34a;color:#fff;opacity:1}
    
/* Breadcrumb navigation */
.breadcrumb{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--fg-muted2);margin-bottom:16px;padding:8px 14px;background:var(--bg-muted);border-radius:var(--radius);flex-wrap:wrap;border:1px solid var(--border-light);cursor:pointer}

/* Rich editor for manual form */
.manual-rich-editor{width:100%;height:calc(100vh - 220px);max-height:calc(100vh - 220px);padding:16px;border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);font-family:var(--font);font-size:14px;line-height:1.8;background:var(--bg);outline:none;overflow-y:auto;white-space:pre-wrap;word-wrap:break-word;resize:vertical}
.manual-form-layout{display:grid;grid-template-columns:280px 1fr 220px;gap:24px;align-items:start}
.manual-form-layout > aside{position:sticky;top:16px;max-height:calc(100vh - 32px);overflow-y:auto}
.manual-toc{font-size:12px}
.manual-toc-title{font-size:11px;font-weight:600;color:var(--fg-muted2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}

.manual-toc a:hover{color:var(--primary);background:var(--primary-light)}

.manual-toc-empty{font-size:11px;color:var(--fg-muted2);font-style:italic}
@media(max-width:1100px){.manual-form-layout{grid-template-columns:260px 1fr}.manual-form-layout > aside:last-child{display:none}}

.manual-rich-editor:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.manual-rich-editor:empty::before{content:attr(data-placeholder);color:var(--fg-muted);pointer-events:none}

.manual-rich-editor h2{font-size:18px;font-weight:600;margin:10px 0 4px;padding:6px 12px;border-left:4px solid var(--primary);background:rgba(37,99,235,.06);border-radius:0 4px 4px 0}
.manual-rich-editor h3{font-size:15px;font-weight:600;margin:8px 0 4px}
.manual-rich-editor p{margin:4px 0}
.manual-rich-editor strong{font-weight:700}
.manual-rich-editor em{font-style:italic}
.manual-rich-editor ul,.manual-rich-editor ol{margin:6px 0;padding-left:24px}
.manual-rich-editor li{margin:2px 0}
.manual-rich-editor code{background:var(--bg-muted);padding:2px 6px;border-radius:3px;font-family:'SFMono-Regular',Consolas,monospace;font-size:13px}
.manual-rich-editor blockquote{border-left:3px solid var(--primary);padding:4px 12px;margin:8px 0;color:var(--fg-muted);background:var(--bg-muted);border-radius:0 var(--radius) var(--radius) 0}
.manual-rich-editor a{color:var(--primary);text-decoration:underline}
.manual-rich-editor hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.manual-rich-editor mark{background:#FEF08A;padding:1px 4px;border-radius:3px}

    
/* Inline editable title */
.editable-title{cursor:text;padding:4px 8px;margin:-4px -8px;border-radius:var(--radius);border:2px solid transparent;transition:all .15s;min-width:100px;outline:none}
.editable-title:hover{border-color:var(--border);background:var(--bg-muted)}
.editable-title:focus{border-color:var(--primary);background:var(--bg);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.editable-desc{cursor:text;padding:4px 8px;margin:-4px -8px;border-radius:var(--radius);border:1px solid transparent;transition:all .15s;outline:none;font-size:14px;color:var(--fg-muted)}
.editable-desc:hover{border-color:var(--border);background:var(--bg-muted)}
.editable-desc:focus{border-color:var(--primary);background:var(--bg);box-shadow:0 0 0 3px rgba(37,99,235,.1);color:var(--fg)}
.editable-desc:empty::before{content:attr(data-placeholder);color:var(--fg-muted2);pointer-events:none}

    </style>
</head>

  <script>
    // DATA STORE (localStorage-backed)
    const STORE_KEY = 'bo-manual-data';
    const DEFAULT_DATA = {
      users: [
        { id: 1, name: '田中太郎' },
        { id: 2, name: '佐藤花子' },
        { id: 3, name: '鈴木一郎' },
      ],
      projects: [
        { id: 1, name: 'カスタマーサポート', description: '顧客対応に関するマニュアル群', createdBy: 0 },
        { id: 2, name: '営業チーム', description: '営業プロセスのマニュアル群', createdBy: 0 },
      ],
      manuals: [
        { id: 1, projectId: 1, title: '問い合わせ対応マニュアル', purpose: 'お客様からの問い合わせに対し、迅速かつ丁寧に対応し、顧客満足度を維持・向上させること', operationPace: '週5日、9:00-18:00', responseSpeed: '初回応答：30分以内、解決：24時間以内', taskRoadmap: '<h2>対応フロー</h2><ol><li><strong>問い合わせ受信</strong>：チケットシステムで受付</li><li><strong>分類・優先度判定</strong>：緊急/通常/低優先度に分類</li><li><strong>対応開始</strong>：担当者をアサイン</li><li><strong>解決・クローズ</strong>：解決後にフォローアップ</li></ol><h2>エスカレーション基準</h2><ul><li>2時間以内に解決できない場合 → リーダーへエスカレーション</li><li>クレーム案件 → マネージャーへ即時報告</li></ul>', authority: 'チケットの作成・編集・クローズ権限', createdBy: 0 },
        { id: 2, projectId: 1, title: 'FAQ管理マニュアル', purpose: 'よくある質問を整理・更新し、自己解決率を向上させること', operationPace: '週1回の定期更新', responseSpeed: '新規FAQ追加：3営業日以内', taskRoadmap: '<h2>FAQ作成手順</h2><p>問い合わせデータを分析し、頻出質問を抽出します。</p><ol><li>月次で問い合わせ傾向を分析</li><li>新規FAQドラフトを作成</li><li>レビュー・承認</li><li>公開・周知</li></ol>', authority: 'FAQの作成・編集・公開権限', createdBy: 0 },
        { id: 3, projectId: 2, title: '新規顧客開拓マニュアル', purpose: '新規顧客を効率的に開拓し、月間目標のリード獲得数を達成すること', operationPace: '週5日、フルタイム稼働', responseSpeed: 'リード発生から1時間以内に初回コンタクト', taskRoadmap: '<h2>開拓プロセス</h2><ol><li><strong>ターゲットリスト作成</strong></li><li><strong>初回アプローチ</strong>（メール/電話）</li><li><strong>ニーズヒアリング</strong></li><li><strong>提案書作成・送付</strong></li><li><strong>フォローアップ</strong></li></ol>', authority: 'CRMへの顧客情報登録・編集権限', createdBy: 0 },
        { id: 4, projectId: 2, title: '商談管理マニュアル', purpose: '商談の進捗を正確に管理し、成約率を最大化すること', operationPace: '毎日のCRM更新、週次の商談レビュー', responseSpeed: '商談ステータス変更：即日更新', taskRoadmap: '<h2>商談ステージ管理</h2><ul><li><mark>初回面談</mark> → 課題ヒアリング</li><li><mark>提案</mark> → ソリューション提示</li><li><mark>見積</mark> → 価格提示・交渉</li><li><mark>クロージング</mark> → 契約締結</li></ul>', authority: '商談の作成・編集、見積書の発行権限', createdBy: 0 },
      ],
      assignees: [
        { manualId: 1, userId: 1 },
        { manualId: 2, userId: 1 },
        { manualId: 1, userId: 2 },
        { manualId: 3, userId: 2 },
        { manualId: 4, userId: 3 },
        { manualId: 3, userId: 3 },
      ],
      permissions: [],
      goals: [
        { id: 1, type: 'large', title: '顧客満足度の向上', children: [
          { id: 11, type: 'mid', title: '問い合わせ対応品質の改善', children: [
            { id: 111, type: 'small', title: '初回応答時間を30分以内に短縮' },
            { id: 112, type: 'small', title: 'FAQ充実による自己解決率向上' },
          ]},
          { id: 12, type: 'mid', title: 'サービス改善のフィードバック収集', children: [
            { id: 121, type: 'small', title: '月次アンケートの実施' },
          ]},
        ]},
        { id: 2, type: 'large', title: '売上目標の達成', children: [
          { id: 21, type: 'mid', title: '新規顧客の開拓', children: [
            { id: 211, type: 'small', title: '月間リード50件獲得' },
            { id: 212, type: 'small', title: 'アプローチ手法の多様化' },
          ]},
          { id: 22, type: 'mid', title: '成約率の向上', children: [
            { id: 221, type: 'small', title: '商談管理プロセスの徹底' },
          ]},
        ]},
      ],
      todos: [
        { id: 1, type: 'category', goalId: 1, children: [
          { id: 11, type: 'subcategory', goalId: 11, children: [
            { id: 111, type: 'task', title: '週次問い合わせレポート作成', done: false, assignee: '田中太郎', dueDay: '毎週月曜' },
            { id: 112, type: 'task', title: 'FAQ記事の更新確認', done: false, assignee: '田中太郎', dueDay: '毎週金曜' },
          ]},
          { id: 12, type: 'subcategory', goalId: 12, children: [
            { id: 121, type: 'task', title: '月次アンケートの実施', done: false, assignee: '鈴木一郎', dueDay: '毎月1日' },
          ]},
        ]},
        { id: 2, type: 'category', goalId: 2, children: [
          { id: 21, type: 'subcategory', goalId: 21, children: [
            { id: 211, type: 'task', title: '新規リードへの初回コンタクト', done: false, assignee: '佐藤花子', dueDay: '毎日' },
            { id: 212, type: 'task', title: 'ターゲットリスト更新', done: false, assignee: '佐藤花子', dueDay: '毎週月曜' },
          ]},
          { id: 22, type: 'subcategory', goalId: 22, children: [
            { id: 221, type: 'task', title: 'CRM商談データの更新', done: false, assignee: '鈴木一郎', dueDay: '毎日' },
            { id: 222, type: 'task', title: '営業資料のテンプレート刷新', done: false, assignee: '佐藤花子', dueDay: '2026-04-25' },
          ]},
        ]},
      ],
      nextUserId: 4,
      nextProjectId: 3,
      nextManualId: 5,
      nextGoalId: 300,
      nextTodoId: 8,
      tags: [
        { id: 1, name: 'マーケ', color: '#3b82f6' },
        { id: 2, name: 'セールス', color: '#8b5cf6' },
        { id: 3, name: 'CS', color: '#06b6d4' },
        { id: 4, name: 'バックオフィス', color: '#10b981' },
      ],
      nextTagId: 5,
      paceTags: [
        { id: 1, name: '平日毎日 9-18時', color: '#2563eb' },
        { id: 2, name: '週3日', color: '#8b5cf6' },
        { id: 3, name: '週1日', color: '#06b6d4' },
        { id: 4, name: 'スポット対応', color: '#10b981' },
        { id: 5, name: '手動スケジュール', color: '#f59e0b', isManual: true },
      ],
      nextPaceTagId: 6,
      projectTasks: [],
      nextProjectTaskId: 1,
    };

    let data;
    try {
      const saved = localStorage.getItem(STORE_KEY);
      data = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
      // Ensure new fields exist for existing users
      if (!data.goals) data.goals = DEFAULT_DATA.goals;
      if (!data.todos) data.todos = DEFAULT_DATA.todos;
      // Migrate old todo formats to goal-linked tree format
      if (data.todos.length > 0 && data.todos[0] && (!data.todos[0].type || (data.todos[0].type === 'category' && !data.todos[0].goalId))) {
        data.todos = DEFAULT_DATA.todos;
      }
      if (!data.nextGoalId) data.nextGoalId = 300;
      if (!data.nextTodoId) data.nextTodoId = 8;
      if (!data.dailyTasks) data.dailyTasks = {};
      if (!data.nextDailyId) data.nextDailyId = 1;
      // 新規ユーザー用デフォルトタグは 受動/超受動/主動 のみ (ユーザー要望)
      if (!data.tags) data.tags = [
        {id:1,name:'受動',color:'#06b6d4'},
        {id:2,name:'超受動',color:'#8b5cf6'},
        {id:3,name:'主動',color:'#f59e0b'}
      ];
      if (!data.nextTagId) data.nextTagId = 4;
      if (!data.paceTags) data.paceTags = [];
      if (!data.nextPaceTagId) data.nextPaceTagId = 1;
      if (!data.projectTasks) data.projectTasks = [];
      if (!data.nextProjectTaskId) data.nextProjectTaskId = 1;
      // BOチーム の大目的 (team-level 詳細ページ用)
      if (!data.teamMeta) data.teamMeta = { purpose: '', _modTs: 0 };
      // Ensure project memo and files fields
      (data.projects || []).forEach(p => { if (!p.memo) p.memo = ''; if (!p.files) p.files = []; });
      // 一度だけ: "受動/超受動/主動" 以外のタグを削除する (ユーザー要望)。
      // 色・ID は一切変更しない。存在しない場合も自動作成しない。
      // 一度フラグが立ったら以降 2 度と走らない → ユーザーの追加/削除を尊重。
      // v2 bump: 既に _tagStripDone=true の端末でも、余計なデフォルトタグ
      // (週1日/スポット対応/手動スケジュール 等) が残ってるケースがあったので
      // もう 1 回だけ強制的に走らせる。
      (function oneShotStripNonPaceTags() {
        if (data._tagStripDoneV2) return; // v2 済
        data.tags = data.tags || [];
        var KEEP = { '受動':1, '超受動':1, '主動':1 };
        var now = Date.now();
        var strippedIds = {};
        var changed = false;
        // tombstone 方式で削除 → 他端末にも伝搬する
        // (bumpModTs/markDirty はこのタイミングで未定義。tombstone の _modTs を
        //  今の時刻にしておけば merge で必ず local が勝つので十分。)
        data.tags.forEach(function(t){
          if (!t || !t.name) return;
          if (KEEP[t.name]) return;
          if (!t._deleted) {
            t._deleted = true;
            t._modTs = Math.max(now, (t._modTs || 0) + 1);
            strippedIds[t.id] = true;
            changed = true;
          }
        });
        // manual.paceTagId で削除対象を指してたら、もし paceTags 側に正しい名前が
        // あれば同名の生き残り tag に張替、なければ null
        (data.manuals || []).forEach(function(m){
          if (!m || m.paceTagId == null) return;
          if (strippedIds[m.paceTagId]) {
            var oldPace = (data.paceTags || []).find(function(p){ return p.id === m.paceTagId; });
            if (oldPace && KEEP[oldPace.name]) {
              var match = data.tags.find(function(t){ return t.name === oldPace.name && !t._deleted; });
              m.paceTagId = match ? match.id : null;
            } else {
              m.paceTagId = null;
            }
            changed = true;
          }
        });
        (data.projects || []).forEach(function(p){
          if (p && p.tagId != null && strippedIds[p.tagId]) { p.tagId = null; changed = true; }
        });
        // paceTags 全体もクリア
        if (Array.isArray(data.paceTags) && data.paceTags.length > 0) {
          data.paceTags = []; changed = true;
        }
        data._tagStripDoneV2 = true;
        data._tagStripDone = true;
        data._paceTagsMigrated = true;
        try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch(e) {}
        // tombstone した tag を dirty としてマーク (push 時に remote で復活しない
        // よう保護)。 _dirtyMap はこの時点で未定義なので、直接 localStorage に
        // 書いておけば後で _dirtyMap 初期化時に読み込まれる。
        if (changed) {
          try {
            var dirtyKey = 'bo-manual-dirty';
            var raw = localStorage.getItem(dirtyKey);
            var dm = raw ? JSON.parse(raw) : {};
            if (!dm || Array.isArray(dm)) dm = {};
            Object.keys(strippedIds).forEach(function(id){ dm['tags:' + id] = now; });
            localStorage.setItem(dirtyKey, JSON.stringify(dm));
          } catch(e) {}
        }
      })();
      // 業務形態は『感覚 / 仕組み / 作業』の 3 つだけに固定する。
      // tombstone ではなく "物理削除" で処理 — リモートにも残骸を残さない。
      // (loadData 段階・push 直前・remote merge 直後 すべてで filter する)
      var KEEP_TAG_NAMES = { '感覚': '#f59e0b', '仕組み': '#06b6d4', '作業': '#6366f1' };
      window.KEEP_TAG_NAMES = KEEP_TAG_NAMES;
      function isAllowedTag(t) { return !!(t && t.name && KEEP_TAG_NAMES.hasOwnProperty(t.name)); }
      function purgeTags(list) {
        if (!Array.isArray(list)) return [];
        var seen = {};
        return list.filter(function(t) {
          if (!isAllowedTag(t)) return false;     // 許可外 → 物理削除
          if (t._deleted) return false;            // tombstone も物理削除
          if (seen[t.name]) return false;          // 同名重複も物理削除
          seen[t.name] = true;
          return true;
        });
      }
      function ensureTagWhitelist() {
        data.tags = purgeTags(data.tags || []);
        var seen = {};
        data.tags.forEach(function(t){ seen[t.name] = true; });
        Object.keys(KEEP_TAG_NAMES).forEach(function(name) {
          if (!seen[name]) {
            if (!data.nextTagId) data.nextTagId = (data.tags.reduce(function(m,t){return Math.max(m,t.id||0)},0) || 0) + 1;
            data.tags.push({ id: data.nextTagId++, name: name, color: KEEP_TAG_NAMES[name], _modTs: Date.now() });
          }
        });
      }
      window.purgeTags = purgeTags;
      window.ensureTagWhitelist = ensureTagWhitelist;
      // 起動時に物理削除を実行
      ensureTagWhitelist();
      try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch(e) {}
    } catch {
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    }
    function saveData() { localStorage.setItem(STORE_KEY, JSON.stringify(data)); }

    // TOAST
    function toast(msg) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    // NAVIGATION
    let currentPage = (function() {
      try {
        var saved = JSON.parse(localStorage.getItem('bo_nav'));
        if (saved && saved.page) return saved.page;
      } catch(e) {}
      return window.innerWidth <= 768 ? 'dashboard' : 'home';
    })();
    let pageParams = (function() {
      try {
        var saved = JSON.parse(localStorage.getItem('bo_nav'));
        if (saved && saved.params) return saved.params;
      } catch(e) {}
      return {};
    })();
    function navigate(page, params = {}) {
      // ダッシュボードから他ページに移動する時、停止していた scroll を復活
      if (currentPage === 'dashboard' && page !== 'dashboard') {
        document.body.style.overflow = '';
        document.documentElement.style.overflow = '';
        document.documentElement.style.overscrollBehavior = '';
      }
      // Close sidebar on mobile navigation
      var sb = document.querySelector('.sidebar'); if (sb && sb.classList.contains('open')) { sb.classList.remove('open'); var ov = document.getElementById('sidebar-overlay'); if (ov) ov.remove(); document.body.style.overflow = ''; }
      // If leaving the manual edit form, force a final autosave + history snapshot
      if (currentPage === 'manual-form' && page !== 'manual-form') {
        try { if (typeof flushManualFormOnHide === 'function') flushManualFormOnHide(); } catch(e) {}
        try { if (typeof snapshotManualFormHistory === 'function') snapshotManualFormHistory(); } catch(e) {}
      }
      currentPage = page;
      pageParams = params;
      try { localStorage.setItem('bo_nav', JSON.stringify({page: page, params: params})); } catch(e) {}
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.page === page);
      });
      const navTitle = document.querySelector(`.nav-item[data-page="${page}"]`)?.textContent.trim() || '';
      document.getElementById('mobile-title').textContent = (page === 'home' && window.innerWidth <= 768) ? 'BOタスク' : (page === 'dashboard' ? 'BOタスク' : navTitle);
      const isFullscreen = page === 'manual-detail' || page === 'project-detail' || page === 'manual-form' || page === 'member-page' || page === 'member-manual';
      document.querySelector('.sidebar').classList.toggle('hidden', isFullscreen);

      opts.forEach(function(o){

        b.textContent = o.label;
        b.addEventListener('click', function(ev){ ev.stopPropagation(); pop.remove(); o.click(); });
        pop.appendChild(b);
      });
      // Position near the anchor button (above the + if there's no space below, else below)
      document.body.appendChild(pop);
      anchorBtn.classList.add('open');
      var r = anchorBtn.getBoundingClientRect();
      var pw = pop.offsetWidth, ph = pop.offsetHeight;
      var top = r.bottom + 6;
      if (top + ph > window.innerHeight - 10) top = r.top - ph - 6;
      var left = r.left + (r.width / 2) - (pw / 2);
      if (left < 8) left = 8;
      if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
      pop.style.top = (top + window.scrollY) + 'px';
      pop.style.left = (left + window.scrollX) + 'px';
      // Close on outside click (next tick so the opening click doesn't close immediately)
      setTimeout(function(){
        var onDoc = function(ev){
          if (!pop.contains(ev.target) && ev.target !== anchorBtn) {
            pop.remove();
            anchorBtn.classList.remove('open');
            document.removeEventListener('click', onDoc);
          }
        };
        document.addEventListener('click', onDoc);
      }, 0);

    // Pace tag + schedule helpers
    // 稼働ペースはプロジェクトタグ (data.tags) を使う。既存マニュアルの
    // paceTagId が旧 data.paceTags を指している場合はそちらにフォールバック。
    function getPaceTag(id) {
      if (id == null) return undefined;
      var t = (data.tags || []).find(function(x) { return x.id === id && !x._deleted; });
      if (t) return t;
      return (data.paceTags || []).find(function(x) { return x.id === id && !x._deleted; });
    }
    // 繰り返しパターンピッカーを表示する条件:
    //   - tag.isManual === true (手動スケジュール旧タグの後方互換)
    //   - または tag.name が "主動" (プロジェクトタグには isManual がないので名前で判定)
    function isManualPaceTag(tag) {
      if (!tag) return false;
      if (tag.isManual) return true;
      var n = (tag.name || '').trim();
      return n === '主動';
    }
    function formatSchedule(s) {
      if (!s || !s.type) return '';
      var days = ['日','月','火','水','木','金','土'];
      if (s.type === 'frequency') {
        var unit = { day: '日', week: '週', month: 'ヶ月' }[s.unit] || '';
        return '1' + unit + 'に' + (s.count || 1) + '回';
      }
      if (s.type === 'weekly') {
        var d = (s.days || []).map(function(i){ return days[i]; }).join('・');
        return '毎週 ' + d + (s.time ? ' ' + s.time : '');
      }
      if (s.type === 'monthly') {
        return '毎月 ' + (s.day || 1) + '日' + (s.time ? ' ' + s.time : '');
      }
      if (s.type === 'daily') {
        return '毎日 ' + ((s.times || []).join(', ') || '');
      }
      if (s.type === 'interval') {
        return (s.hours || 1) + '時間おき';
      }
      return '';
    }
    function formatPace(manual) {
      if (!manual) return '';
      if (manual.paceTagId) {
        var tag = getPaceTag(manual.paceTagId);
        if (tag) {
          if (isManualPaceTag(tag)) {
            var desc = formatSchedule(manual.paceSchedule);
            return desc ? tag.name + '（' + desc + '）' : tag.name;
          }
          return tag.name;
        }
      }
      return manual.operationPace || '';
    }
    function paceTagColor(manual) {
      if (!manual || !manual.paceTagId) return '';
      var tag = getPaceTag(manual.paceTagId);
      return tag ? tag.color : '';
    }
    function dueBadgeHtml(t) {
      if (!t.dueDate || t.done) return '';
      var now = new Date(); now.setHours(0,0,0,0);
      var due = new Date(t.dueDate); due.setHours(0,0,0,0);
      var diff = Math.round((due - now) / 86400000);
      if (diff < 0) return '<span style="font-size:10px;color:#ef4444;font-weight:600;margin-left:4px">期限切れ</span>';
      if (diff === 0) return '<span style="font-size:10px;color:#f59e0b;font-weight:600;margin-left:4px">今日</span>';
      if (diff <= 3) return '<span style="font-size:10px;color:#f59e0b;margin-left:4px">あと' + diff + '日</span>';
      return '<span style="font-size:10px;color:var(--fg-muted);margin-left:4px">' + t.dueDate + '</span>';
    }
    function getManualsByUser(uid) { return data.assignees.filter(a => a.userId === uid).map(a => ({ ...a, manual: getManual(a.manualId) })).filter(a => a.manual); }
    function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
        function getProjectMap() {
      var liveProjects = data.projects.filter(function(p){ return p && !p._deleted; });
      var liveManuals = (data.manuals || []).filter(function(m){ return m && !m._deleted; });
      function buildNode(p) {
        var node = { projectId: p.id, projectName: p.name, manuals: [], users: [], subProjects: [] };
        liveProjects.forEach(function(child) {
          if (child.parentId === p.id) node.subProjects.push(buildNode(child));
        });
        liveManuals.forEach(function(manual) {
          if (manual.projectId !== p.id) return;
          if (!node.manuals.find(function(m) { return m.id === manual.id; })) node.manuals.push(manual);
        });
        (data.assignees || []).forEach(function(a) {
          var manual = getManual(a.manualId);
          var user = getUser(a.userId);
          if (!manual || !user) return;
          if (manual.projectId !== p.id) return;
          if (!node.users.find(function(u) { return u.id === user.id; })) node.users.push(user);
        });
        return node;
      }
      var roots = [];
      liveProjects.forEach(function(p) { if (!p.parentId) roots.push(buildNode(p)); });
      return roots;
    }

    function showModal(title, bodyHtml, actions) {

      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);
      const actionsEl = overlay.querySelector('#modal-actions');
      actions.forEach(a => {
        const btn = document.createElement('button');
        btn.className = `btn ${a.class || 'btn-outline'}`;
        btn.textContent = a.label;
        btn.onclick = () => { a.onClick(overlay); };
        actionsEl.appendChild(btn);
      });
      return overlay;
    }

    function confirmDeleteTag(tagId) {

          html += '<div style="padding:4px 0;font-size:12px;color:var(--fg-muted);display:flex;align-items:center;gap:6px" onclick="event.stopPropagation();navigate(\'manual-detail\',{id:' + m.id + '})">';
          html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="' + c.bg + '" stroke="' + c.bg + '" stroke-width="2" stroke-linejoin="round" style="flex-shrink:0"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>';
          html += escapeHtml(m.title) + '</div>';
        });
        // Build visible task tree: hide done tasks, but promote non-done orphans
        // (children whose parent is done/hidden) to top level so they still appear
        function buildVisibleTaskTree(allTasks) {
          var visible = allTasks.filter(function(t){ return !t.done; });
          var visibleIds = {};
          visible.forEach(function(t){ visibleIds[t.id] = true; });
          // Effective parentTaskId: if parent not visible, treat as top-level
          visible.forEach(function(t){
            t._effectiveParent = (t.parentTaskId && visibleIds[t.parentTaskId]) ? t.parentTaskId : null;
          });
          return visible;
        }
        var visibleMProjTasks = buildVisibleTaskTree(mProjTasks);
        function getVisibleChildren(parentId, pool) {
          return pool.filter(function(c){ return c._effectiveParent === parentId; });
        }
        // Tasks inside. プロジェクト直下でも基準インデントを付けて、プロジェクト
        // 名の右下にネストしているように見せる (ユーザー要望)
        function renderMobileTaskRow(t, depth) {
          var INDENT = 18, CBOX = 20, BASE = 14;
          var leftPad = BASE + depth * INDENT;
          html += '<div style="position:relative;padding:4px 0;padding-left:' + leftPad + 'px;font-size:12px;color:var(--fg-muted);display:flex;align-items:center;gap:6px;cursor:pointer;' + (t.done ? 'opacity:.5' : '') + '" onclick="event.stopPropagation();navigate(\'task-detail\',{id:' + t.id + '})">';
          html += '<div class="todo-checkbox ' + (t.done ? 'checked' : '') + '" style="width:' + CBOX + 'px;height:' + CBOX + 'px;font-size:8px;position:relative;z-index:1" onclick="event.stopPropagation();expandProjectTaskActions(this,' + t.id + ',' + t.done + ')">' + (t.done ? '<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : '<svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg>') + '</div>';
          html += '<span style="' + (t.done ? 'text-decoration:line-through' : '') + '">' + escapeHtml(t.title) + '</span>' + dueBadgeHtml(t);
          html += '</div>';
          var kids = getVisibleChildren(t.id, visibleMProjTasks);
          kids.forEach(function(c){ renderMobileTaskRow(c, depth + 1); });
        }
        visibleMProjTasks.filter(function(t){ return !t._effectiveParent; }).forEach(function(t){ renderMobileTaskRow(t, 0); });
        // Sub-projects
        if (proj.subProjects.length > 0) {
          proj.subProjects.forEach(function renderSub(sp) {
            var sc = getProjectColor(sp.projectId);
            var spTasks = getTasksByProject(sp.projectId);
            html += '<div style="margin-top:6px;padding-left:10px">';
            html += '<div style="font-size:12px;font-weight:500;color:' + sc.text + ';padding:2px 0" onclick="event.stopPropagation();navigate(\'project-detail\',{id:' + sp.projectId + '})">' + escapeHtml(sp.projectName) + '</div>';

              html += '<div style="padding:4px 0;font-size:12px;color:var(--fg-muted);display:flex;align-items:center;gap:6px;cursor:pointer" onclick="event.stopPropagation();navigate(\'manual-detail\',{id:' + m.id + '})">';
              html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="' + sc.bg + '" stroke="' + sc.bg + '" stroke-width="2" stroke-linejoin="round" style="flex-shrink:0"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>';
              html += '<span>' + escapeHtml(m.title) + '</span>';
              html += '</div>';
            });
            function renderSpTaskRow(t, depth) {
              var INDENT = 18, CBOX = 20, BASE = 14;
              var leftPad = BASE + depth * INDENT;
              html += '<div style="position:relative;padding:4px 0;padding-left:' + leftPad + 'px;font-size:12px;color:var(--fg-muted);display:flex;align-items:center;gap:6px;cursor:pointer;' + (t.done ? 'opacity:.5' : '') + '" onclick="event.stopPropagation();navigate(\'task-detail\',{id:' + t.id + '})">';
              html += '<div class="todo-checkbox ' + (t.done ? 'checked' : '') + '" style="width:' + CBOX + 'px;height:' + CBOX + 'px;font-size:8px;position:relative;z-index:1" onclick="event.stopPropagation();expandProjectTaskActions(this,' + t.id + ',' + t.done + ')">' + (t.done ? '<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : '<svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg>') + '</div>';
              html += '<span style="' + (t.done ? 'text-decoration:line-through' : '') + '">' + escapeHtml(t.title) + '</span>' + dueBadgeHtml(t);
              html += '</div>';
              getVisibleChildren(t.id, visibleSpTasks).forEach(function(c){ renderSpTaskRow(c, depth + 1); });
            }
            var visibleSpTasks = buildVisibleTaskTree(spTasks);
            visibleSpTasks.filter(function(t){ return !t._effectiveParent; }).forEach(function(t){ renderSpTaskRow(t, 0); });
            sp.subProjects.forEach(renderSub);
            html += '</div>';
          });
        }
        html += '</div>';
      });
      html += '<button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" onclick="showProjectDialog()">+ プロジェクト追加</button>';

        var s = JSON.parse(localStorage.getItem('bo-dash-cal') || '{}');
        var d = new Date();
        _dashCalYear = (typeof s.y === 'number') ? s.y : d.getFullYear();

        _dashCalYear = d2.getFullYear(); _dashCalMonth = d2.getMonth();

      try { localStorage.setItem('bo-dash-cal', JSON.stringify({y:_dashCalYear, m:_dashCalMonth, sel:_dashCalSelected})); } catch(e){}
    }
    function dashCalPrev() { _dashCalMonth--; if (_dashCalMonth < 0) { _dashCalMonth = 11; _dashCalYear--; } _saveDashCalState(); render(); }
    function dashCalNext() { _dashCalMonth++; if (_dashCalMonth > 11) { _dashCalMonth = 0; _dashCalYear++; } _saveDashCalState(); render(); }

      _dashCalSelected = null;

    // カレンダー上でタスクを別日にドラッグ移動
    function gcalTaskDragStart(e, taskId) {
      e.stopPropagation();
      e.dataTransfer.setData('application/x-gcal-task', String(taskId));
      e.dataTransfer.effectAllowed = 'move';
      window._gcalDragTaskId = taskId;
      e.currentTarget.style.opacity = '0.4';
    }
    function gcalTaskDragEnd(e) {
      e.currentTarget.style.opacity = '';
      document.querySelectorAll('.gcal-grid .drop-target').forEach(function(el){ el.classList.remove('drop-target'); });
      window._gcalDragTaskId = null;
    }
    function gcalCellDragOver(e) {
      if (window._gcalDragTaskId == null) return;
      e.preventDefault();
      e.stopPropagation();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.classList.add('drop-target');
    }
    function gcalCellDrop(e, ymd) {
      e.preventDefault();
      e.stopPropagation();
      e.currentTarget.classList.remove('drop-target');
      var taskId = Number(e.dataTransfer.getData('application/x-gcal-task'));
      if (!taskId || !ymd) return;
      var t = (data.projectTasks || []).find(function(x){ return x.id === taskId && !x._deleted; });
      if (!t) return;
      if (t.dueDate === ymd) return;
      t.dueDate = ymd;
      t._modTs = bumpModTs(t._modTs);
      markDirty('projectTasks', t.id);
      saveData();
      toast('締切を ' + ymd + ' に変更しました');
      render();
    }
    window.gcalTaskDragStart = gcalTaskDragStart;

    function buildDeadlineCalendarHtml() {
      // 完了タスクはカレンダーに出さない (live + dueDate + !done)
      var tasksByDate = {};
      (data.projectTasks || []).forEach(function(t){
        if (!t || t._deleted || t.done || !t.dueDate) return;
        (tasksByDate[t.dueDate] = tasksByDate[t.dueDate] || []).push(t);
      });
      var today = new Date();
      var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
      var firstDay = new Date(_dashCalYear, _dashCalMonth, 1).getDay();

      }
      html += '</div>'; // grid
      html += '</div>'; // wrap

            t.projectId = newProjId;
            t._modTs = bumpModTs(t._modTs);

      function handleTaskDrop(e, targetId) {
        e.preventDefault();
        e.stopPropagation();
        var el = e.currentTarget;
        var zone = getDropZone(e, el);
        el.classList.remove('drop-target','drop-before','drop-after');
        var draggedId = Number(e.dataTransfer.getData('application/x-task-id'));
        if (!draggedId || draggedId === targetId) return;
        if (isDescendantTask(draggedId, targetId)) { toast('循環構造は作れません'); return; }
        var src = (data.projectTasks || []).find(function(t){ return t.id === draggedId && !t._deleted; });
        var tgt = (data.projectTasks || []).find(function(t){ return t.id === targetId && !t._deleted; });
        if (!src || !tgt) return;
        // projectId は target に合わせる + 子孫タスクも全部同じ projectId に cascade
        var newProjId = tgt.projectId;
        if (zone === 'inside') {
          src.parentTaskId = tgt.id;
          var idx = data.projectTasks.indexOf(src);
          if (idx >= 0) { data.projectTasks.splice(idx, 1); data.projectTasks.push(src); }
        } else {
          src.parentTaskId = tgt.parentTaskId != null ? tgt.parentTaskId : null;
          var fromIdx = data.projectTasks.indexOf(src);
          if (fromIdx >= 0) data.projectTasks.splice(fromIdx, 1);
          var toIdx = data.projectTasks.indexOf(tgt);
          if (zone === 'after') toIdx += 1;
          data.projectTasks.splice(toIdx, 0, src);
        }
        src.projectId = newProjId;
        src._modTs = bumpModTs(src._modTs);
        markDirty('projectTasks', src.id);
        cascadeTaskProjectId(src.id, newProjId);
        saveData();
        toast(zone === 'inside' ? 'タスクを移動しました (子孫含む)' : '並び順を変更しました');
        render();
      }
      window.cascadeTaskProjectId = cascadeTaskProjectId;
      window.handleTaskDragStart = handleTaskDragStart;
      window.handleTaskDragEnd = handleTaskDragEnd;

      function drawMindmapLines(projects) {
        var svg = document.getElementById('mindmap-svg');
        var inner = document.getElementById('mindmap-inner');
        if (!svg || !inner) return;
        var innerRect = inner.getBoundingClientRect();
        var scale = mapZoom;
        function getPos(node) {
          if (!node) return null;
          var r = node.getBoundingClientRect();
          return { x: (r.left + r.width / 2 - innerRect.left) / scale, y: (r.top + r.height / 2 - innerRect.top) / scale, left: (r.left - innerRect.left) / scale, right: (r.right - innerRect.left) / scale, top: (r.top - innerRect.top) / scale, bottom: (r.bottom - innerRect.top) / scale };
        }
        var rootNode = inner.querySelector('[data-node="root"]');
        var rootPos = getPos(rootNode);
        if (!rootPos) { svg.innerHTML = ''; return; }
        var paths = '';
        // Collect all project positions
        var projNodes = [];
        projects.forEach(function(proj) {
          var c = getProjectColor(proj.projectId);
          var projNode = inner.querySelector('[data-node="proj-' + proj.projectId + '"]');
          var pp = getPos(projNode);
          if (pp) projNodes.push({ pos: pp, color: c.bg, projectId: proj.projectId });
        });
        if (projNodes.length === 0) { svg.innerHTML = ''; return; }
        // Root trunk line
        var trunkX = rootPos.right + 30;
        var topY = Math.min.apply(null, projNodes.map(function(p){return p.pos.y}));
        var botY = Math.max.apply(null, projNodes.map(function(p){return p.pos.y}));
        paths += '<path d="M' + rootPos.right + ' ' + rootPos.y + ' L' + trunkX + ' ' + rootPos.y + '" fill="none" stroke="#cbd5e1" stroke-width="2"/>';
        if (projNodes.length > 1) {
          paths += '<path d="M' + trunkX + ' ' + topY + ' L' + trunkX + ' ' + botY + '" fill="none" stroke="#cbd5e1" stroke-width="2"/>';
        }
        // Lines from trunk to each project
        projNodes.forEach(function(pd) {
          paths += '<path d="M' + trunkX + ' ' + pd.pos.y + ' L' + pd.pos.left + ' ' + pd.pos.y + '" fill="none" stroke="' + pd.color + '" stroke-width="2"/>';
        });
        // Draw lines for sub-project tree recursively
        function drawSubLines(parentNode, parentId) {
          if (!parentNode) return;
          var container = parentNode.closest('.project-branch,.sub-tree-row');
          if (!container) return;
          var childrenDiv = container.querySelector(':scope > .sub-tree-children');
          if (!childrenDiv) return;
          var childNodes = childrenDiv.querySelectorAll(':scope > .sub-tree-row > .sub-tree-card-wrap > [data-node]');
          if (childNodes.length === 0) return;
          var parentPos = getPos(parentNode);
          if (!parentPos) return;
          var childPositions = [];
          childNodes.forEach(function(cn) { var cp = getPos(cn); if (cp) childPositions.push({ pos: cp, node: cn }); });
          if (childPositions.length === 0) return;
          var midX = parentPos.right + 15;
          var cTopY = Math.min.apply(null, childPositions.map(function(c){return c.pos.y}));
          var cBotY = Math.max.apply(null, childPositions.map(function(c){return c.pos.y}));
          // Horizontal line from parent right
          paths += '<path d="M' + parentPos.right + ' ' + parentPos.y + ' L' + midX + ' ' + parentPos.y + '" fill="none" stroke="#cbd5e1" stroke-width="1.5" opacity="0.5"/>';
          // Vertical connector
          if (childPositions.length > 1) {
            paths += '<path d="M' + midX + ' ' + cTopY + ' L' + midX + ' ' + cBotY + '" fill="none" stroke="#cbd5e1" stroke-width="1.5" opacity="0.4"/>';
          }
          // Lines to each child
          childPositions.forEach(function(cp) {
            paths += '<path d="M' + midX + ' ' + cp.pos.y + ' L' + cp.pos.left + ' ' + cp.pos.y + '" fill="none" stroke="#cbd5e1" stroke-width="1.5" opacity="0.5"/>';
            // Recurse for children of this child
            drawSubLines(cp.node, null);
          });
        }
        // Draw sub-project lines for each project
        projects.forEach(function(proj) {
          var projNode = inner.querySelector('[data-node="proj-' + proj.projectId + '"]');
          if (projNode) drawSubLines(projNode, proj.projectId);
        });
        var innerW = inner.scrollWidth;
        var innerH = inner.scrollHeight;
        svg.setAttribute('width', innerW);
        svg.setAttribute('height', innerH);
        svg.setAttribute('viewBox', '0 0 ' + innerW + ' ' + innerH);
        svg.innerHTML = paths;
      }

        html += '<div class="empty">' + icons.book + '<p>マニュアルがありません</p></div>';

        if (!p || p._deleted) return;

        if (ms.length > 0) {
          orderedProjIds.push(p.id);
          groupedByProj[p.id] = { project: p, manuals: ms };
        }
      });
      // Project に紐づかないマニュアル (孤児) も表示
      var orphans = liveManuals.filter(function(m){ return !m.projectId || !getProject(m.projectId); });

          html += '<span style="font-size:14px;color:var(--fg);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtml(m.title) + '</span>';

      html += '</div>';

    // Mobile side panel controls

    function shareManualLink(manualId) {
      var url = location.origin + location.pathname + '?manual=' + manualId;
      var fallback = function() {
        window.prompt('このリンクをコピーして共有してください:', url);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function() {
          toast('共有リンクをコピーしました');
        }).catch(fallback);
      } else {
        fallback();
      }
    }
    function renderPublicManual() {

        var root = remote;

        console.log('[public manual] looking for id', mid, 'among', manuals.length, 'manuals');

    function collectPaceSchedule() {
      var r = document.querySelector('input[name="schedule-type"]:checked');

      if (type === 'frequency') {
        return { type: 'frequency', unit: document.getElementById('s-freq-unit').value, count: Number(document.getElementById('s-freq-count').value) || 1 };
      }
      if (type === 'weekly') {
        var days = Array.from(document.querySelectorAll('.pace-day input[type="checkbox"]:checked')).map(function(c){ return Number(c.value); });
        return { type: 'weekly', days: days, time: document.getElementById('s-week-time').value || '' };

      if (type === 'monthly') {
        return { type: 'monthly', day: Number(document.getElementById('s-month-day').value) || 1, time: document.getElementById('s-month-time').value || '' };

    function manualFormExecCmd(type, anchor) {
      var editor = document.getElementById('f-roadmap-editor');

      var savedRange = null;
      if (type === 'color' || type === 'highlight') {
        var s = window.getSelection();

      } else {
        editor.focus();

      switch(type) {
        case 'undo': document.execCommand('undo'); break;

        case 'h2': document.execCommand('formatBlock', false, 'h2'); break;
        case 'h3': document.execCommand('formatBlock', false, 'h3'); break;
        case 'p': document.execCommand('formatBlock', false, 'p'); break;
        case 'bold': document.execCommand('bold'); break;
        case 'italic': document.execCommand('italic'); break;
        case 'strike': document.execCommand('strikeThrough'); break;
        case 'ul': document.execCommand('insertUnorderedList'); break;
        case 'ol': document.execCommand('insertOrderedList'); break;
        case 'indent': document.execCommand('indent'); break;

        case 'color':
          showColorPopup(anchor, COLOR_PALETTE, function(color) {
            editor.focus();
            if (savedRange) { var s2 = window.getSelection(); s2.removeAllRanges(); s2.addRange(savedRange); }
            document.execCommand('styleWithCSS', false, true);
            document.execCommand('foreColor', false, color);
          });

        case 'highlight':
          showColorPopup(anchor, HIGHLIGHT_PALETTE, function(color) {
            editor.focus();
            if (savedRange) { var s3 = window.getSelection(); s3.removeAllRanges(); s3.addRange(savedRange); }
            document.execCommand('styleWithCSS', false, true);
            if (color === 'transparent') {
              document.execCommand('hiliteColor', false, 'transparent');

            r2.collapse(true);

          }
          decorateAllBlocks(document.getElementById('f-roadmap-editor'));

        }
        case 'hr': {

          var hr = document.createElement('hr');
          if (range) { range.collapse(false); range.insertNode(hr); }
          break;
        }
        case 'collapse': {

          details.open = true;

            r3.collapse(true);
            sel.removeAllRanges();
            sel.addRange(r3);
          }
          break;
        }
        case 'callout': {
          var sel = window.getSelection();
          var range = sel.rangeCount > 0 ? sel.getRangeAt(0) : null;
          var callout = document.createElement('div');
          callout.className = 'callout';

          callout.appendChild(icon);
          callout.appendChild(body2);
          if (range) { range.deleteContents(); range.insertNode(callout); range.collapse(false); }
          break;
        }
        case 'code': {
          var sel = window.getSelection();
          var range = sel.rangeCount > 0 ? sel.getRangeAt(0) : null;
          var pre = document.createElement('pre');
          pre.className = 'code-block';
          var code = document.createElement('code');
          var selText = sel.toString();
          if (selText) { code.textContent = selText; } else { code.innerHTML = '<br>'; }
          pre.appendChild(code);
          if (range) {

            range.insertNode(pre);

            r.collapse(true);
            sel.removeAllRanges();
            sel.addRange(r);
          }

        }

    // Force a history snapshot of the currently-edited manual (called on close)
    function snapshotManualFormHistory() {
      if (!pageParams || !pageParams.editId) return;
      var m = getManual(pageParams.editId);
      if (!m) return;
      if (!m.history) m.history = [];
      var last = m.history[m.history.length - 1];
      var isSameAsLast = last && last.title === m.title && last.purpose === m.purpose && last.taskRoadmap === m.taskRoadmap;
      if (isSameAsLast) return;
      m.history.push({
        ts: Date.now(),
        title: m.title, purpose: m.purpose, authority: m.authority,
        paceTagId: m.paceTagId, paceSchedule: m.paceSchedule,
        operationPace: m.operationPace, responseSpeed: m.responseSpeed,
        taskRoadmap: m.taskRoadmap,
        _source: 'close'
      });
      // History is NEVER purged — user explicitly demanded full retention
      saveData();
      if (typeof pushSyncNow === 'function') pushSyncNow();
    }
