              copyBtn.onclick = function() {
                navigator.clipboard.writeText(ta.value).then(function() {
                  copyBtn.classList.add('copied');
                  copyBtn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z"/></svg>Copied!';
                  setTimeout(function() {
                    copyBtn.classList.remove('copied');
                    copyBtn.innerHTML = '<svg viewBox="0 0 1616"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25zM5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25z"/></svg>Copy';
                  }, 1500);
                });
              };
              wrapper.appendChild(ta);
              wrapper.appendChild(copyBtn);
            var delBtn = document.createElement('button');
            delBtn.className = 'code-textbox-delete-btn';
            delBtn.type = 'button';
            delBtn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.75.75 0 111.06 1.06L9.06 8l3.22 3.22a.75.75 0 11-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 01-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 010-1.06z"></path></svg>削除';
            delBtn.onclick = function() {
              if (confirm('このコードブロックを削除しますか？')) {
                wrapper.remove();
              }
            };
            wrapper.appendChild(delBtn);
              range.deleteContents();
              range.insertNode(wrapper);
              var newRange = document.createRange();
              newRange.setStartAfter(wrapper);
              sel.removeAllRanges();
              sel.addRange(newRange);
            }
            break;
          }
          case 'quote': {
          const text = sel.toString() || '\u5F15\u7528\u30C6\u30AD\u30B9\u30C8';
          const bq = document.createElement('blockquote');
          bq.textContent = text;
          if (range) {

          }

      }

    function handleFileUpload(projectId, files) {
      const project = getProject(projectId);
      if (!project) return;
      if (!project.files) project.files = [];
      Array.from(files).forEach(file => {
        if (file.size > 5 * 1024 * 1024) { toast('ファイルサイズが5MBを超えています: ' + file.name); return; }
        const reader = new FileReader();
        reader.onload = (e) => {
          project.files.push({ name: file.name, size: file.size, type: file.type, dataUrl: e.target.result });
          saveData();
          render();
        };
        reader.readAsDataURL(file);
      });
    }

    function deleteProjectFile(projectId, fileIndex) {
      const project = getProject(projectId);
      if (!project || !project.files) return;
      project.files.splice(fileIndex, 1);
      saveData();
      render();
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function findGoalById(goalId) {
      if (!data.goals) return null;
      for (const g of data.goals) {
        if (g.id === goalId) return g;
        if (g.children) {
          for (const mid of g.children) {
            if (mid.id === goalId) return mid;
            if (mid.children) {
              for (const sm of mid.children) {
                if (sm.id === goalId) return sm;
              }
            }
          }
        }
      }
      return null;
    }

    function findTodoNodeByPath(ids) {
      if (!data.todos || ids.length === 0) return null;
      let nodes = data.todos;
      let current = null;
      for (const id of ids) {
        current = nodes.find(n => n.id === id);
        if (!current) return null;
        nodes = current.children || [];
      }
      return current;
    }

    function addGoalChild(parentId, parentType) {
      const name = prompt(parentType === 'large' ? '中目的の名前:' : '小目的の名前:');
      if (!name) return;
      const parent = findGoalById(parentId);
      if (!parent) return;
      if (!parent.children) parent.children = [];
      parent.children.push({id: Date.now(), name: name, children: []});
      saveData();
      render();
    }

      if (!node) return;
      if (!node.children) node.children = [];
      node.children.push({id: Date.now(), type: 'task', title: title, done: false, assignee: '', dueDay: ''});
      saveData();
      render();
    }

      if (type === 'small') html += ',' + pageParams.parentLargeId + ',' + pageParams.parentMidId;
      html += ');navigate(\'goals\')}">' + icons.trash + ' 削除する</button>';

      // Check button for marking as complete (for small goals)
      if (type === 'small') {
        html += '<button class="todo-detail-action-btn check" onclick="toast(\'目的を達成済みにしました\');navigate(\'goals\')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> 達成済みにする</button>';
      }

      html += '</div>';
      html += '</div>';
      el.innerHTML = html;
    }

    // Card tap-to-show-delete handler (for mobile)
    document.addEventListener('click', function(e) {
      var card = e.target.closest('.card');
      if (card && card.querySelector('.card-delete-btn')) {
        // If clicking the delete button itself, don't toggle
        if (e.target.closest('.card-delete-btn')) return;
        // Toggle show-delete on this card
        var wasShowing = card.classList.contains('show-delete');
        // Close all other show-delete cards
        document.querySelectorAll('.card.show-delete').forEach(function(c) { c.classList.remove('show-delete'); });
        if (!wasShowing) card.classList.add('show-delete');
      } else {
        // Clicked outside - close all
        document.querySelectorAll('.card.show-delete').forEach(function(c) { c.classList.remove('show-delete'); });
      }
    });
    // INIT
    render();
  
    // === Block Copy Buttons ===
    (function() {
      const COPY_ICON = '<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>';
      const CHECK_ICON = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>';

      function addCopyBtn(el) {
        if (el.querySelector('.block-copy-btn')) return;
        el.classList.add('copyable-block');
        const btn = document.createElement('button');
        btn.className = 'block-copy-btn';
        btn.innerHTML = COPY_ICON + ' \u30B3\u30D4\u30FC';
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          e.preventDefault();
          const text = el.innerText.replace(/\u30B3\u30D4\u30FC$/, '').trim();
          navigator.clipboard.writeText(text).then(function() {
            onCopied(btn);
          }).catch(function() {
            var ta = document.createElement('textarea');
            ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.select();
            document.execCommand('copy'); document.body.removeChild(ta);
            onCopied(btn);
          });
        });
        el.appendChild(btn);
      }

      function onCopied(btn) {
        btn.classList.add('copied');
        btn.innerHTML = CHECK_ICON + ' \u30B3\u30D4\u30FC\u6E08';
        if (typeof showToast === 'function') showToast('\u30B3\u30D4\u30FC\u3057\u307E\u3057\u305F');
        setTimeout(function() {
          btn.classList.remove('copied');
          btn.innerHTML = COPY_ICON + ' \u30B3\u30D4\u30FC';
        }, 1500);
      }

      function autoLinkify(el) {
      if (!el) return;
      el.addEventListener('click', function(e) {
        if (e.target.tagName === 'A') { e.preventDefault(); window.open(e.target.href, '_blank'); }
      });
      el.addEventListener('input', function() {
        var sel = window.getSelection();
        if (!sel.rangeCount) return;
        var node = sel.anchorNode;
        if (!node || node.nodeType !== 3) return;
        var text = node.textContent;
        var urlRx = /(https?:\/\/[^\s<]+)/g;
        if (urlRx.test(text)) {
          var rng = sel.getRangeAt(0); var off = rng.startOffset;
          node.parentElement.innerHTML = node.parentElement.innerHTML.replace(urlRx, '<a href="$1" target="_blank">$1</a>');
          try { sel.collapse(el, Math.min(off, el.childNodes.length)); } catch(e2) {}
        }
      });
    }
    function scanBlocks() {
        // Only add copy buttons to code blocks (pre) 
        document.querySelectorAll('.memo-rich-editor pre, .doc-main pre, .main-area pre').forEach(addCopyBtn);
      }
      // Run on page changes via MutationObserver
      var observer = new MutationObserver(function() {
        setTimeout(scanBlocks, 100);
      });
      observer.observe(document.body, { childList: true, subtree: true });

      // Initial scan
      setTimeout(scanBlocks, 300);
    })();
    </script>
</body>
</html>
