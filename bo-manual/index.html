      html += `</select><span id="task-count" class="text-sm" style="color:var(--fg-muted)"></span></div></div>`;
      html += `<div id="task-list"><div class="empty" style="padding:48px"><p>責任者を選択するとタスクが表示されます</p></div></div>`;
      el.innerHTML = html;
    }
    function renderTasksForUser() {
      const uid = Number(document.getElementById('task-user-select').value);
      const container = document.getElementById('task-list');
      const countEl = document.getElementById('task-count');
      if (!uid) { container.innerHTML = `<div class="empty"><p>責任者を選択するとタスクが表示されます</p></div>`; countEl.textContent = ''; return; }
      const tasks = getManualsByUser(uid);
      countEl.textContent = `${tasks.length} 件のタスク`;
      if (tasks.length === 0) { container.innerHTML = `<div class="empty"><p>アサインされたマニュアルがありません</p></div>`; return; }
      let html = '';
      tasks.forEach(t => {
        const project = getProject(t.manual.projectId);
        html += `<div class="card mb-2" onclick="navigate('manual-detail',{id:${t.manual.id}})" style="cursor:pointer;padding:16px 20px">
          <div class="flex items-center gap-2 mb-2"><span style="font-weight:600;font-size:13px;word-break:break-word">${escapeHtml(t.manual.title)}</span></div>
          <div class="purpose-box mb-2"><div class="flex items-center gap-2">${icons.target}<p class="text-sm" style="word-break:break-word">${escapeHtml(t.manual.purpose)}</p></div></div>
          <div class="flex items-center gap-3 text-xs" style="color:var(--fg-muted);flex-wrap:wrap">${icons.folder} ${escapeHtml(project?.name || '')}
            ${(function(){var p = formatPace(t.manual); return p ? `<span class="badge badge-outline">${escapeHtml(p)}</span>` : '';})()}
          </div>
        </div>`;
      });
      container.innerHTML = html;
    }

    // GOALS (Purpose Tree)
    function renderGoals(el) {
      let html = `<div class="page-header"><h1 class="page-title">目的ツリー</h1><button class="btn btn-primary" onclick="showAddGoalDialog('large')">${icons.plus} プロジェクトを追加</button></div>`;
      if (!data.goals || data.goals.length === 0) {
        html += renderBreadcrumb();
      html += `<div class="empty">${icons.target}<p>目的がまだ登録されていません</p></div>`;
      } else {
        html += `<div class="goal-tree">`;
        data.goals.forEach(g => {
          html += `<div class="goal-large">
            <div class="goal-large-title" style="cursor:pointer" onclick="showGoalOverlay(${g.id},'large','${escapeHtml(g.title)}')">${icons.target} ${escapeHtml(g.title)}
             
             
            </div>`;
          if (g.children && g.children.length > 0) {
            g.children.forEach(mid => {
              html += `<div class="goal-mid">
                <div class="goal-mid-title" style="cursor:pointer" onclick="showGoalOverlay(${mid.id},'mid','${escapeHtml(mid.title)}',${g.id})">${escapeHtml(mid.title)}
                 
                 
                </div>`;
              if (mid.children && mid.children.length > 0) {
                mid.children.forEach(sm => {
                  html += `<div class="goal-small">
                    <div class="goal-small-title" style="cursor:pointer" onclick="showGoalOverlay(${sm.id},'small','${escapeHtml(sm.title)}',${g.id},${mid.id})">${escapeHtml(sm.title)}
                     
                    </div>
                  </div>`;
                });
              }
              html += `</div>`;
            });
          }
          html += `</div>`;
        });
        html += `</div>`;
      }
      el.innerHTML = html;
    }

    function showAddGoalDialog(type, parentLargeId, parentMidId) {
      const labels = { large: '大目的', mid: '中目的', small: '小目的' };
      showModal(`${labels[type]}を追加`,
        `<div class="form-group"><label class="label">${labels[type]}のタイトル</label><input class="input" id="d-goal-title" placeholder="目的を入力"></div>`,
        [
          { label: 'キャンセル', onClick: o => o.remove() },
          { label: '追加', class: 'btn btn-primary', onClick: o => {
            const title = document.getElementById('d-goal-title').value.trim();
            if (!title) { toast('タイトルを入力してください'); return; }
            const newId = data.nextGoalId++;
            if (type === 'large') {
              data.goals.push({ id: newId, type: 'large', title, children: [] });
            } else if (type === 'mid') {
              const parent = data.goals.find(g => g.id === parentLargeId);
              if (parent) { if (!parent.children) parent.children = []; parent.children.push({ id: newId, type: 'mid', title, children: [] }); }
            } else if (type === 'small') {
              const parent = data.goals.find(g => g.id === parentLargeId);
              if (parent) { const mid = parent.children?.find(m => m.id === parentMidId); if (mid) { if (!mid.children) mid.children = []; mid.children.push({ id: newId, type: 'small', title }); } }
            }
            saveData(); toast(`${labels[type]}を追加しました`); o.remove(); render();
          }}
        ]
      );
    }

    function deleteGoal(id, type, parentLargeId, parentMidId) {
      if (type === 'large') {
        data.goals = data.goals.filter(g => g.id !== id);
      } else if (type === 'mid') {
        const parent = data.goals.find(g => g.id === parentLargeId);
        if (parent) parent.children = (parent.children || []).filter(m => m.id !== id);
      } else if (type === 'small') {
        const parent = data.goals.find(g => g.id === parentLargeId);
        if (parent) { const mid = (parent.children || []).find(m => m.id === parentMidId); if (mid) mid.children = (mid.children || []).filter(s => s.id !== id); }
      }
      saveData(); toast('目的を削除しました'); render();
    }

    // TODOS (Tree format - linked to Goals)
    function getGoalTitle(goalId) {
      function search(nodes) {
        for (const n of (nodes || [])) {
          if (n.id === goalId) return n.title;
          const found = search(n.children);
          if (found) return found;
        }
        return null;
      }
      return search(data.goals) || '(目的未設定)';
    }

    // Active action popup tracking
    let activeActionPopup = null;

    function closeActionPopup() {
      if (activeActionPopup) {
        const el = document.getElementById('action-popup-' + activeActionPopup);
        if (el) el.remove();
        activeActionPopup = null;
      }
    }

    document.addEventListener('click', function(e) {
      if (activeActionPopup && !e.target.closest('.todo-action-popup') && !e.target.closest('.todo-checkbox')) {
        closeActionPopup();
      }
    });

    function showActionPopup(nodeId, path) {
      closeActionPopup();
      activeActionPopup = nodeId;
      const checkbox = document.querySelector('[data-checkbox-id="' + nodeId + '"]');
      if (!checkbox) return;
      const popup = document.createElement('div');
      popup.className = 'todo-action-popup';
      popup.id = 'action-popup-' + nodeId;
      popup.innerHTML = '<button class="todo-action-btn complete" onclick="event.stopPropagation();completeTask(\'' + path + '\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> 完了</button>'
        + '<button class="todo-action-btn delete" onclick="event.stopPropagation();deleteTaskFromPopup(\'' + path + '\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg> 削除</button>';
      checkbox.parentElement.style.position = 'relative';
      checkbox.parentElement.appendChild(popup);
    }

    function findNodeByPath(pathStr) {
      const ids = pathStr.split(',').map(Number);
      let nodes = data.todos;
      let node = null;
      for (const id of ids) {
        node = (nodes || []).find(n => n.id === id);
        if (!node) return null;
        nodes = node.children;
      }
      return node;
    }

    function completeTask(pathStr) {
      const node = findNodeByPath(pathStr);
      if (node) {
        node.done = !node.done;
        saveData();
      }
      closeActionPopup();
      render();
    }

    function deleteTaskFromPopup(pathStr) {
      const ids = pathStr.split(',').map(Number);
      if (ids.length === 1) {
        data.todos = (data.todos || []).filter(n => n.id !== ids[0]);
      } else {
        const parentPath = ids.slice(0, -1);
        let nodes = data.todos;
        let parent = null;
        for (const id of parentPath) {
          parent = (nodes || []).find(n => n.id === id);
          if (!parent) return;
          nodes = parent.children;
        }
        if (parent) parent.children = (parent.children || []).filter(n => n.id !== ids[ids.length - 1]);
      }
      saveData();
      closeActionPopup();
      toast('削除しました');
      render();
    }

    function collectAllTasks(nodes, path, projectLabels) {
      var result = [];
      (nodes || []).forEach(function(node) {
        var nodePath = path ? path + ',' + node.id : String(node.id);
        if (node.type === 'task') {
          result.push({ node: node, path: nodePath, project: projectLabels.join(' › ') });
          // Sub-tasks (children of a task)
          if (node.children && node.children.length > 0) {
            node.children.forEach(function(child) {
              if (child.type === 'task') {
                result.push({ node: child, path: nodePath + ',' + child.id, project: projectLabels.join(' › '), isChild: true, parentTitle: node.title });
              }
            });
          }
        } else {
          var title = node.goalId ? getGoalTitle(node.goalId) : (node.title || '');
          result = result.concat(collectAllTasks(node.children, nodePath, projectLabels.concat(title ? [title] : [])));
        }
      });
      return result;
    }

    function getTaskProjectPath(pathStr) {
      var ids = pathStr.split(',').map(Number);
      var labels = [];
      var nodes = data.todos;
      for (var i = 0; i < ids.length - 1; i++) {
        var node = (nodes || []).find(function(n) { return n.id === ids[i]; });
        if (!node) break;
        if (node.type !== 'task') {
          var title = node.goalId ? getGoalTitle(node.goalId) : (node.title || '');
          if (title) labels.push(title);
        }
        nodes = node.children;
      }
      return labels.join(' › ');
    }

    // 折りたたみ状態 (デバイスローカル永続化。cross-device 同期はしない — UX state)
    var COLLAPSE_KEY = 'bo-tasks-collapse';
    function _loadCollapsed() {
      try { return new Set(JSON.parse(localStorage.getItem(COLLAPSE_KEY) || '[]')); }
      catch(e) { return new Set(); }
    }
    function _saveCollapsed(s) {
      try { localStorage.setItem(COLLAPSE_KEY, JSON.stringify(Array.from(s))); } catch(e){}
    }
    function toggleTaskTreeNode(key) {
      var s = _loadCollapsed();
      if (s.has(key)) s.delete(key); else s.add(key);
      _saveCollapsed(s);
      render();
    }
    window.toggleTaskTreeNode = toggleTaskTreeNode;

    // ===== 緊急重要マトリックス =====
    function renderMatrix(el) {
      var liveTasks = (data.projectTasks || []).filter(function(t){ return t && !t._deleted && !t.done; });
      // q -> tasks
      var byQ = {1:[], 2:[], 3:[], 4:[], 0:[]}; // 0 = unassigned
      liveTasks.forEach(function(t){
        var q = (t.matrixQ === 1 || t.matrixQ === 2 || t.matrixQ === 3 || t.matrixQ === 4) ? t.matrixQ : 0;
        byQ[q].push(t);
      });
      var html = '<div class="page-header"><h1 class="page-title">緊急重要マトリックス</h1></div>';
      html += renderBreadcrumb();
      // Layout: 2x2 with axis labels
      html += '<div style="display:grid;grid-template-columns:32px 1fr;grid-template-rows:32px 1fr;gap:0;min-height:min(70vh, 640px);margin-bottom:16px;position:relative;isolation:isolate">';
      // top-left blank
      html += '<div></div>';
      // top axis label "緊急 →"
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:0 12px;font-size:12px;color:var(--fg-muted);font-weight:600"><span>← 緊急ではない</span><span>緊急 →</span></div>';
      // left axis label (rotated) "↑ 重要"
      // 左軸ラベル: 縦に "↑" / "重" / "要" を普通に積み上げる (回転なしで自然に読める)
      html += '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:12px;color:var(--fg-muted);font-weight:600;line-height:1"><span>↑</span><span>重</span><span>要</span></div>';
      // 2x2 inner grid
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:8px">';
      // Order: top-left = Q2 (重要×非緊急), top-right = Q1 (重要×緊急)
      //        bot-left = Q4 (非重要×非緊急), bot-right = Q3 (非重要×緊急)
      [2, 1, 4, 3].forEach(function(q){
        var meta = MATRIX_META[q];
        html += '<div data-q="' + q + '" ondragover="matrixCellDragOver(event,' + q + ')" ondragleave="this.classList.remove(\'drop-target\')" ondrop="matrixCellDrop(event,' + q + ')" style="background:' + meta.light + ';border:1px solid ' + meta.bg + ';border-radius:8px;padding:10px;display:flex;flex-direction:column;overflow:hidden">';
        html += '<div style="margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid ' + meta.bg + '33">';
        html += '<div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px">';
        html += '<div><span style="font-size:13px;font-weight:700;color:' + meta.bg + '">' + meta.name + '</span> <span style="font-size:11px;color:' + meta.bg + ';font-weight:500;margin-left:4px">' + meta.sub + '</span></div>';
        html += '<div style="font-size:11px;color:' + meta.bg + ';font-weight:600">' + byQ[q].length + '</div>';
        html += '</div>';
        if (meta.hint) html += '<div style="font-size:10px;color:var(--fg-muted);margin-top:3px;line-height:1.3">' + escapeHtml(meta.hint) + '</div>';
        html += '</div>';
        html += '<div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px">';
        if (byQ[q].length === 0) {
          html += '<div style="font-size:11px;color:var(--fg-muted2);text-align:center;padding:20px 0">タスクをここにドロップ</div>';
        } else {
          byQ[q].sort(function(a,b){ return (a.title||'').localeCompare(b.title||''); });
          byQ[q].forEach(function(t){
            var pc = getProjectColor(t.projectId);
            var projPath = _getProjectPathLabel(t.projectId);
            html += '<div class="matrix-task" draggable="true" ondragstart="matrixTaskDragStart(event,' + t.id + ')" ondragend="matrixTaskDragEnd(event)" onclick="navigate(\'task-detail\',{id:' + t.id + '})" style="background:#fff;border-left:4px solid ' + meta.bg + ';border-radius:6px;padding:6px 10px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.04)">';
            if (projPath) html += '<div style="font-size:9px;color:var(--fg-muted2);display:flex;align-items:center;gap:4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><span style="width:5px;height:5px;border-radius:50%;background:' + pc.bg + ';flex-shrink:0"></span>' + escapeHtml(projPath) + '</div>';
            html += '<div style="font-size:13px;font-weight:500;color:var(--fg)">' + escapeHtml(t.title) + '</div>';
            html += '</div>';
          });
        }
        html += '</div></div>';
      });
      html += '</div>'; // 2x2
      html += '</div>'; // outer grid

      // Unassigned bin (タスクをまだマトリックスに置いていない)
      // clear:both + 明確な境界でグリッドと重ならないよう強制
      if (byQ[0].length > 0) {
        html += '<div style="clear:both;height:0"></div>';
        html += '<div data-q="0" ondragover="matrixCellDragOver(event,0)" ondragleave="this.classList.remove(\'drop-target\')" ondrop="matrixCellDrop(event,0)" style="margin-top:16px;padding:12px;border:1px dashed var(--border);border-radius:8px;background:#fafafa;position:relative;z-index:1">';
        html += '<div style="font-size:12px;font-weight:600;color:var(--fg-muted);margin-bottom:8px">未分類 (' + byQ[0].length + ')</div>';
        // タスクは縦にスタックして重なり防止 (横並び wrap だと浮いた pill のように見える)
        html += '<div style="display:flex;flex-direction:column;gap:6px">';
        byQ[0].forEach(function(t){
          var pc = getProjectColor(t.projectId);
          var projPath = _getProjectPathLabel(t.projectId);
          html += '<div class="matrix-task" draggable="true" ondragstart="matrixTaskDragStart(event,' + t.id + ')" ondragend="matrixTaskDragEnd(event)" onclick="navigate(\'task-detail\',{id:' + t.id + '})" style="background:#fff;border:1px solid var(--border);border-left:4px solid ' + pc.bg + ';border-radius:6px;padding:6px 10px;cursor:pointer">';
          if (projPath) html += '<div style="font-size:9px;color:var(--fg-muted2);margin-bottom:1px">' + escapeHtml(projPath) + '</div>';
          html += '<div style="font-size:13px">' + escapeHtml(t.title) + '</div>';
          html += '</div>';
        });
        html += '</div></div>';
      }
      el.innerHTML = html;
    }
    function matrixTaskDragStart(e, taskId) {
      e.stopPropagation();
      e.dataTransfer.setData('application/x-matrix-task', String(taskId));
      e.dataTransfer.effectAllowed = 'move';
      window._matrixDragTaskId = taskId;
      e.currentTarget.style.opacity = '0.4';
    }
    function matrixTaskDragEnd(e) {
      e.currentTarget.style.opacity = '';
      document.querySelectorAll('[data-q].drop-target').forEach(function(el){ el.classList.remove('drop-target'); });
      window._matrixDragTaskId = null;
    }
    function matrixCellDragOver(e, q) {
      if (window._matrixDragTaskId == null) return;
      e.preventDefault();
      e.stopPropagation();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.classList.add('drop-target');
    }
    function matrixCellDrop(e, q) {
      e.preventDefault();
      e.stopPropagation();
      e.currentTarget.classList.remove('drop-target');
      var taskId = Number(e.dataTransfer.getData('application/x-matrix-task'));
      if (!taskId) return;
      setTaskMatrixQ(taskId, q === 0 ? null : q);
      toast('マトリックスを更新しました');
    }
    window.matrixTaskDragStart = matrixTaskDragStart;
    window.matrixTaskDragEnd = matrixTaskDragEnd;
    window.matrixCellDragOver = matrixCellDragOver;
    window.matrixCellDrop = matrixCellDrop;

    function renderTodos(el) {
      var collapsed = _loadCollapsed();
      var tasks = (data.projectTasks || []).filter(isLive);
      var projects = (data.projects || []).filter(function(p){ return p && !p._deleted; });

      // project.id -> tasks (grouped once)
      var tasksByProject = {};
      tasks.forEach(function(t){
        var pid = t.projectId || 0;
        (tasksByProject[pid] = tasksByProject[pid] || []).push(t);
      });

      var html = '';
      // チェブロン (開閉トグル)
      function chevron(isOpen, key) {
        return '<span class="tree-chev" style="display:inline-block;width:18px;text-align:center;cursor:pointer;color:var(--fg-muted);user-select:none;flex-shrink:0" onclick="event.stopPropagation();toggleTaskTreeNode(\'' + key + '\')">' + (isOpen ? '▼' : '▶') + '</span>';
      }

      // --- BOチーム (大目的) ヘッダ ---
      var teamKey = 'team';
      var teamOpen = !collapsed.has(teamKey);
      var teamPurpose = (data.teamMeta && data.teamMeta.purpose) ? data.teamMeta.purpose : '';
      html += '<div class="tree-node team-node" style="padding:10px 8px;margin-bottom:4px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:6px">';
      html += chevron(teamOpen, teamKey);
      html += '<div style="flex:1;min-width:0;cursor:pointer" onclick="navigate(\'team-detail\')">';
      html += '<div style="font-size:14px;font-weight:700;color:#1e293b">BOチーム <span style="font-size:11px;color:var(--fg-muted);font-weight:500">大目的</span></div>';
      if (teamPurpose) {
        html += '<div style="font-size:12px;color:var(--fg-muted);margin-top:2px;white-space:pre-wrap">' + escapeHtml(teamPurpose) + '</div>';
      } else {
        html += '<div style="font-size:11px;color:var(--fg-muted2);margin-top:2px;font-style:italic">タップして大目的を入力</div>';
      }
      html += '</div></div>';

      if (!teamOpen) { el.innerHTML = html; return; }

      // --- プロジェクト階層 (root projects → sub-projects recursively) ---
      function renderProjectNode(project, depth) {
        var projKey = 'proj:' + project.id;
        var projOpen = !collapsed.has(projKey);
        var color = getProjectColor(project.id);
        var projTasks = (tasksByProject[project.id] || []);
        var subProjects = projects.filter(function(p){ return p.parentId === project.id; });
        var hasChildren = projTasks.length > 0 || subProjects.length > 0 || !!project.description;
        var indent = depth * 18 + 8;
        html += '<div class="tree-node project-node" style="padding:8px;padding-left:' + indent + 'px;display:flex;align-items:flex-start;gap:6px;margin:6px 0">';
        if (hasChildren) html += chevron(projOpen, projKey);
        else html += '<span style="display:inline-block;width:18px;flex-shrink:0"></span>';
        html += '<div style="flex:1;min-width:0;cursor:pointer" onclick="navigate(\'project-detail\',{id:' + project.id + '})">';
        var labelDepth = depth === 0 ? '中目的' : ('小目的' + (depth > 1 ? ' (階層 ' + (depth+1) + ')' : ''));
        html += '<div style="font-size:13px;font-weight:600;color:' + color.bg + '">' + escapeHtml(project.name) + ' <span style="font-size:10px;color:var(--fg-muted);font-weight:500">' + labelDepth + '</span></div>';
        if (project.description) {
          html += '<div style="font-size:12px;color:var(--fg-muted);margin-top:2px;white-space:pre-wrap">' + escapeHtml(project.description) + '</div>';
        }
        html += '</div></div>';

        if (!projOpen) return;

        // タスク (階層付き)
        var projTaskSet = {};
        projTasks.forEach(function(t){ projTaskSet[t.id] = true; });
        var topTasks = projTasks.filter(function(t){ return !t.parentTaskId || !projTaskSet[t.parentTaskId]; });
        topTasks.forEach(function(t){ renderTaskNode(t, depth + 1, projTasks); });

        // Sub-projects (再帰)
        subProjects.forEach(function(sp){ renderProjectNode(sp, depth + 1); });
      }

      function renderTaskNode(task, depth, siblingPool) {
        var taskKey = 'task:' + task.id;
        var taskOpen = !collapsed.has(taskKey);
        var children = siblingPool.filter(function(c){ return c.parentTaskId === task.id; });
        var hasChildren = children.length > 0;
        var indent = depth * 18 + 8;

        var arr = raw ? JSON.parse(raw) : [];

        // Strip `history` from the manuals snapshot — each manual.history
        // already stores historical states, so including it in every backup
        // snapshot bloats localStorage by O(history × snapshots). The manual
        // object itself is enough to recover content.
        var manualsSlim = (data.manuals || []).map(function(m) {
          var copy = {};
          Object.keys(m).forEach(function(k){ if (k !== 'history') copy[k] = m[k]; });
          return copy;
        });
        var snap = {
          ts: now,
          reason: reason || 'save',
          manuals: JSON.parse(JSON.stringify(manualsSlim)),
          projects: JSON.parse(JSON.stringify(data.projects || [])),
          projectTasks: JSON.parse(JSON.stringify(data.projectTasks || [])),
          tags: JSON.parse(JSON.stringify(data.tags || [])),
          paceTags: JSON.parse(JSON.stringify(data.paceTags || []))
        };
        // Skip only if identical to last snapshot AND last snapshot is very recent (< 30s)
        // This still lets us snapshot periodically even if nothing changed
        var prev = arr[arr.length - 1];
        if (prev && (now - prev.ts) < 30000
            && JSON.stringify(prev.manuals) === JSON.stringify(snap.manuals)
            && JSON.stringify(prev.projectTasks) === JSON.stringify(snap.projectTasks)
            && JSON.stringify(prev.projects) === JSON.stringify(snap.projects)) {
          return;
        }
        arr.push(snap);
        if (arr.length > BACKUP_MAX) arr = arr.slice(-BACKUP_MAX);
        try {
          localStorage.setItem(BACKUPS_KEY, JSON.stringify(arr));
        } catch (e) {
          // Storage full — trim harder and retry
          arr = arr.slice(-Math.floor(BACKUP_MAX / 2));
          try { localStorage.setItem(BACKUPS_KEY, JSON.stringify(arr)); } catch(e2) {}
        }
      } catch (e) { /* never throw from backup path */ }
    }

    setInterval(function() {

    }, 30000);

    });

        if (!remote || typeof remote !== 'object') return;

    function countTasks(node) {

      if (node.type === 'task') {

      }
      (node.children || []).forEach(child => {
        const c = countTasks(child);
        total += c.total;
        done += c.done;
      });
      return { total, done };
    }

    function deleteTodoNodeByPath(pathStr) {
      const ids = pathStr.split(',').map(Number);
      if (ids.length === 1) {
        data.todos = (data.todos || []).filter(n => n.id !== ids[0]);
      } else {
        const parentIds = ids.slice(0, -1);
        let nodes = data.todos;
        let parent = null;
        for (const id of parentIds) {
          parent = (nodes || []).find(n => n.id === id);
          if (!parent) return;
          nodes = parent.children;
        }
        if (parent) parent.children = (parent.children || []).filter(n => n.id !== ids[ids.length - 1]);
      }
      saveData();
      toast('削除しました');
      render();
    }

    function toggleProjectTask(taskId) {
      var task = (data.projectTasks || []).find(function(t) { return isLive(t) && t.id === taskId; });
      if (task) { task.done = !task.done; task._modTs = bumpModTs(task._modTs); markDirty('projectTasks', task.id); saveData(); render(); }
    }
    function deleteProjectTask(taskId) {
      // Cascade: delete descendants too. Tombstone instead of physical removal
      // so the deletion propagates across devices via sync (remote merge is
      // non-destructive, so physically removed items would be resurrected).
      var toDelete = new Set([taskId]);
      var changed = true;
      while (changed) {
        changed = false;
        (data.projectTasks || []).forEach(function(t) {
          if (t.parentTaskId && toDelete.has(t.parentTaskId) && !toDelete.has(t.id)) {
            toDelete.add(t.id);
            changed = true;
          }
        });
      }
      var now = Date.now();
      (data.projectTasks || []).forEach(function(t) {
        if (toDelete.has(t.id)) { t._deleted = true; t._modTs = bumpModTs(t._modTs); markDirty('projectTasks', t.id); }
      });
      saveData(); render();
    }
    function expandProjectTaskActions(el, taskId, isDone) {
      if (el.classList.contains('expanded')) {
        collapseProjectTaskCheckbox(el, isDone);
        return;
      }
      document.querySelectorAll('.todo-checkbox.expanded').forEach(function(other) {
        if (other !== el) {
          var wasChecked = other.classList.contains('checked');
          other.classList.remove('expanded');
          var ow = other.getAttribute('data-orig-w');
          var oh = other.getAttribute('data-orig-h');
          other.style.width = ow || '';
          other.style.height = oh || '';
          other.innerHTML = wasChecked ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg>';
        }
      });
      el.setAttribute('data-orig-w', el.style.width || '');
      el.setAttribute('data-orig-h', el.style.height || '');
      el.classList.add('expanded');
      el.innerHTML = '<span class="action-icon check-icon" onclick="event.stopPropagation();toggleProjectTask(' + taskId + ')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>' +
        '<span class="action-icon delete-icon" onclick="event.stopPropagation();deleteProjectTask(' + taskId + ')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></span>';
    }
    function collapseProjectTaskCheckbox(el, isDone) {

      el.style.width = ow || '';

      }
    }

    function loadTaskMemoToEditor(taskId) {
      var task = (data.projectTasks || []).find(function(t) { return isLive(t) && t.id === taskId; });
      var editor = document.getElementById('memo-rich-editor');
      if (!task || !editor) return;
      if (task.memo) {
        editor.innerHTML = markdownToHtml(task.memo);
      }
      editor.addEventListener('copy', function(e) {
        var sel = window.getSelection();
        if (!sel.rangeCount) return;
        var container = document.createElement('div');
        container.appendChild(sel.getRangeAt(0).cloneContents());
        e.clipboardData.setData('text/plain', htmlToMarkdown(container));
        e.preventDefault();
      });
      editor.addEventListener('cut', function(e) {
        var sel = window.getSelection();
        if (!sel.rangeCount) return;
        var range = sel.getRangeAt(0);
        var container = document.createElement('div');
        container.appendChild(range.cloneContents());
        e.clipboardData.setData('text/plain', htmlToMarkdown(container));
        range.deleteContents();
        e.preventDefault();
      });
    }

    function confirmDeleteProject(id) {
      const project = getProject(id);
      const manualCount = getManualCountForProject(id);
      showModal('プロジェクトを削除',
        `<p class="confirm-text">「${escapeHtml(project?.name || '')}」を削除しますか？${manualCount > 0 ? `このプロジェクトに含まれる ${manualCount} 件のマニュアルも削除されます。` : ''}この操作は取り消せません。</p>`,
        [
          { label: 'キャンセル', onClick: o => o.remove() },
          { label: '削除', class: 'btn btn-destructive', onClick: o => {
            // tombstone 方式: physical 削除だと pushSync の merge で復活する。
            // 配下のサブプロジェクト・マニュアル・タスクも cascade で tombstone。
            var toKill = new Set([id]);
            var changed = true;
            while (changed) {
              changed = false;
              data.projects.forEach(function(p){
                if (p && !p._deleted && p.parentId != null && toKill.has(p.parentId) && !toKill.has(p.id)) {
                  toKill.add(p.id); changed = true;
                }
              });
            }
            var now = Date.now();
            toKill.forEach(function(pid){
              var p = data.projects.find(function(x){ return x.id === pid; });
              if (p && !p._deleted) { p._deleted = true; p._modTs = bumpModTs(p._modTs); markDirty('projects', p.id); }
            });
            // Cascade tombstone manuals under killed projects
            (data.manuals || []).forEach(function(m){
              if (m && !m._deleted && toKill.has(m.projectId)) {
                m._deleted = true; m._modTs = bumpModTs(m._modTs); markDirty('manuals', m.id);
              }
            });
            // Cascade tombstone tasks under killed projects
            (data.projectTasks || []).forEach(function(t){
              if (t && !t._deleted && toKill.has(t.projectId)) {
                t._deleted = true; t._modTs = bumpModTs(t._modTs); markDirty('projectTasks', t.id);
              }
            });
            saveData(); toast('プロジェクトを削除しました'); o.remove(); navigate('home');
          }}
        ]
      );
    }

    function markdownToHtml(md) {
      if (!md) return '';
      let html = md;
      // Code blocks
      html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      // Inline code
      html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
      // Headings
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      // Bold+Italic
      html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      // Bold
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Italic
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // Strikethrough
      html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');
      // Blockquote
      html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
      // HR
      html = html.replace(/^---$/gm, '<hr>');
      // Checkbox
      html = html.replace(/^- \[x\] (.+)$/gm, '<li data-checked="true">$1</li>');
      html = html.replace(/^- \[ \] (.+)$/gm, '<li data-checked="false">$1</li>');
      // Unordered list
      html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
      // Ordered list
      html = html.replace(/^(\d+)\. (.+)$/gm, '<li data-num="$1">$2</li>');
      // Wrap li in ul
      html = html.replace(/(<li[^>]*>.*?<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; });
      // Links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      // Paragraphs
      html = html.replace(/\n\n/g, '</p><p>');
      html = html.replace(/\n/g, '<br>');
      html = '<p>' + html + '</p>';
      html = html.replace(/<p><\/p>/g, '');
      html = html.replace(/<p>(<h[1-3]>)/g, '$1');
      html = html.replace(/(<\/h[1-3]>)<\/p>/g, '$1');
      html = html.replace(/<p>(<pre>)/g, '$1');
      html = html.replace(/(<\/pre>)<\/p>/g, '$1');
      html = html.replace(/<p>(<ul>)/g, '$1');
      html = html.replace(/(<\/ul>)<\/p>/g, '$1');
      html = html.replace(/<p>(<blockquote>)/g, '$1');
      html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
      html = html.replace(/<p>(<hr>)/g, '$1');
      html = html.replace(/(<hr>)<\/p>/g, '$1');
      return html;
    }

    function htmlToMarkdown(el) {
      let md = '';
      function walk(node) {
        if (node.nodeType === 3) {
          md += node.textContent;
          return;
        }
        if (node.nodeType !== 1) return;
        const tag = node.tagName.toLowerCase();
        switch(tag) {
          case 'h1': md += '# '; walkChildren(node); md += '\n'; break;
          case 'h2': md += '## '; walkChildren(node); md += '\n'; break;
          case 'h3': md += '### '; walkChildren(node); md += '\n'; break;
          case 'strong': case 'b': md += '**'; walkChildren(node); md += '**'; break;
          case 'em': case 'i': md += '*'; walkChildren(node); md += '*'; break;
          case 'del': case 's': md += '~~'; walkChildren(node); md += '~~'; break;
          case 'code':
            if (node.parentElement && node.parentElement.tagName === 'PRE') {
              walkChildren(node);
            } else {
              md += '`'; walkChildren(node); md += '`';
            }
            break;
          case 'pre': md += '\n```\n'; walkChildren(node); md += '\n```\n'; break;
          case 'blockquote': md += '> '; walkChildren(node); md += '\n'; break;
          case 'ul': case 'ol': walkChildren(node); break;
          case 'li':
            if (node.hasAttribute('data-checked')) {
              md += (node.getAttribute('data-checked') === 'true' ? '- [x] ' : '- [ ] ');
            } else if (node.parentElement && node.parentElement.tagName === 'OL') {
              md += '1. ';
            } else {
              md += '- ';
            }
            walkChildren(node); md += '\n'; break;
          case 'a':
            md += '['; walkChildren(node); md += '](' + (node.getAttribute('href') || 'url') + ')';
            break;
          case 'hr': md += '\n---\n'; break;
          case 'br': md += '\n'; break;
          case 'p': case 'div':
            if (md.length > 0 && !md.endsWith('\n\n') && !md.endsWith('\n')) md += '\n';
            walkChildren(node);
            if (!md.endsWith('\n')) md += '\n';
            break;
          default: walkChildren(node); break;
        }
      }
      function walkChildren(node) {
        node.childNodes.forEach(walk);
      }
      walkChildren(el);
      // Clean up extra newlines
      md = md.replace(/\n{3,}/g, '\n\n').trim();
      return md;
    }

              copyBtn.classList.add('copied');
              copyBtn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z"></path></svg> Copied!';

    function memoExecCmd(type, anchor) {
      const editor = document.getElementById('memo-rich-editor');
      if (!editor) return;
      // Save selection for color/highlight popups
      var savedRange = null;
      if (type === 'color' || type === 'highlight') {
        var ss = window.getSelection();
        if (ss.rangeCount) savedRange = ss.getRangeAt(0).cloneRange();
      } else {
        editor.focus();
      }
      const sel = window.getSelection();
      const range = sel.rangeCount > 0 ? sel.getRangeAt(0) : null;
      switch(type) {
        case 'undo': document.execCommand('undo'); break;
        case 'redo': document.execCommand('redo'); break;
        case 'h1': document.execCommand('formatBlock', false, 'h1'); break;
        case 'h2': document.execCommand('formatBlock', false, 'h2'); break;
        case 'h3': document.execCommand('formatBlock', false, 'h3'); break;
        case 'p': document.execCommand('formatBlock', false, 'p'); break;
        case 'bold': document.execCommand('bold'); break;
        case 'italic': document.execCommand('italic'); break;
        case 'strike': document.execCommand('strikeThrough'); break;
        case 'ul': document.execCommand('insertUnorderedList'); break;
        case 'ol': document.execCommand('insertOrderedList'); break;
        case 'indent': document.execCommand('indent'); break;
        case 'outdent': document.execCommand('outdent'); break;
        case 'color':
          if (typeof showColorPopup === 'function') {
            showColorPopup(anchor, COLOR_PALETTE, function(color) {
              editor.focus();
              if (savedRange) { var s2 = window.getSelection(); s2.removeAllRanges(); s2.addRange(savedRange); }
              document.execCommand('styleWithCSS', false, true);
              document.execCommand('foreColor', false, color);
            });
          }
          break;
        case 'highlight':
          if (typeof showColorPopup === 'function') {
            showColorPopup(anchor, HIGHLIGHT_PALETTE, function(color) {
              editor.focus();
              if (savedRange) { var s3 = window.getSelection(); s3.removeAllRanges(); s3.addRange(savedRange); }
              document.execCommand('styleWithCSS', false, true);
              document.execCommand('hiliteColor', false, color);
            });

          break;
        case 'check': {
          const text = sel.toString() || '\u30BF\u30B9\u30AF';
          const li = document.createElement('li');
          li.setAttribute('data-checked', 'false');
          li.textContent = text;
          const ul = document.createElement('ul');
          ul.appendChild(li);
          if (range) {
            range.deleteContents();
            range.insertNode(ul);
          }
          break;
        }
        case 'code': {
          var text = sel.toString() || '';
          var code = document.createElement('code');
          if (text) code.textContent = text;
          if (range) {
            range.deleteContents();
            range.insertNode(code);
          }
          // Place cursor inside
          var r2 = document.createRange();
          r2.selectNodeContents(code);
          r2.collapse(text ? false : true);
          sel.removeAllRanges();
          sel.addRange(r2);
          break;
        }
          case 'codeblock': {
            if (range) {
              var wrapper = document.createElement('div');
              wrapper.className = 'code-textbox-wrapper';
              wrapper.contentEditable = 'false';
              var ta = document.createElement('textarea');

              var copyBtn = document.createElement('button');
              copyBtn.className = 'code-textbox-copy-btn';
              copyBtn.type = 'button';
              copyBtn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25zM5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25z"/></svg>Copy';
              copyBtn.onclick = function() {
                navigator.clipboard.writeText(ta.value).then(function() {
                  copyBtn.classList.add('copied');
                  copyBtn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z"/></svg>Copied!';
                  setTimeout(function() {
                    copyBtn.classList.remove('copied');

                  }, 1500);

              wrapper.appendChild(ta);
              wrapper.appendChild(copyBtn);
            var delBtn = document.createElement('button');
            delBtn.className = 'code-textbox-delete-btn';

            delBtn.onclick = function() {
              if (confirm('このコードブロックを削除しますか？')) {
                wrapper.remove();
              }
            };
            wrapper.appendChild(delBtn);
              range.deleteContents();
              range.insertNode(wrapper);
              var newRange = document.createRange();
              newRange.setStartAfter(wrapper);
              sel.removeAllRanges();
              sel.addRange(newRange);
            }
            break;
          }
          case 'quote': {
          const text = sel.toString() || '\u5F15\u7528\u30C6\u30AD\u30B9\u30C8';
          const bq = document.createElement('blockquote');
          bq.textContent = text;
          if (range) {
            range.deleteContents();
            range.insertNode(bq);

        case 'link': {
          const text = sel.toString() || '\u30EA\u30F3\u30AF\u30C6\u30AD\u30B9\u30C8';

            a.textContent = text;
            if (range) {
              range.deleteContents();
              range.insertNode(a);
            }
          }
          break;
        }
        case 'hr': {
          const hr = document.createElement('hr');
          if (range) {
            range.collapse(false);
            range.insertNode(hr);
          }
          break;
        }
        case 'collapse': {
          const details = document.createElement('details');
          details.open = true;
          const summary = document.createElement('summary');
          summary.textContent = sel.toString() || '';
          const body = document.createElement('div');
          body.className = 'details-body';
          body.innerHTML = '<p><br></p>';
          details.appendChild(summary);
          details.appendChild(body);
          if (range) {
            range.deleteContents();
            range.insertNode(details);
            // Move cursor into summary so the user can type the title immediately
            var r3 = document.createRange();
            r3.selectNodeContents(summary);
            r3.collapse(true);
            sel.removeAllRanges();
            sel.addRange(r3);
          }
          break;
        }
        case 'callout': {
          const callout = document.createElement('div');
          callout.className = 'callout';
          const icon = document.createElement('div');
          icon.className = 'callout-icon';
          icon.textContent = '💡';
          icon.setAttribute('contenteditable', 'true');
          const cbody = document.createElement('div');
          cbody.className = 'callout-body';
          cbody.innerHTML = '<p>' + escapeHtml(sel.toString() || '') + '<br></p>';
          callout.appendChild(icon);
          callout.appendChild(cbody);
          if (range) { range.deleteContents(); range.insertNode(callout); range.collapse(false); }
          break;
        }
        case 'code': {
          const pre = document.createElement('pre');
          pre.className = 'code-block';
          const code = document.createElement('code');
          const selText = sel.toString();
          if (selText) { code.textContent = selText; } else { code.innerHTML = '<br>'; }
          pre.appendChild(code);
          if (range) {
            range.deleteContents();
            range.insertNode(pre);
            const r = document.createRange();
            r.selectNodeContents(code);
            r.collapse(true);
            sel.removeAllRanges();
            sel.addRange(r);
          }
          break;
        }

    function saveProjectMemo(projectId) {
      const project = getProject(projectId);
      if (!project) return;
      const editor = document.getElementById('memo-rich-editor');
      if (!editor) return;
      project.memo = htmlToMarkdown(editor);
      project._modTs = bumpModTs(project._modTs);
      markDirty('projects', project.id);

    function handleFileUpload(projectId, files) {
      const project = getProject(projectId);
      if (!project) return;
      if (!project.files) project.files = [];
      Array.from(files).forEach(file => {
        if (file.size > 5 * 1024 * 1024) { toast('ファイルサイズが5MBを超えています: ' + file.name); return; }
        const reader = new FileReader();
        reader.onload = (e) => {
          project.files.push({ name: file.name, size: file.size, type: file.type, dataUrl: e.target.result });
          saveData();
          render();
        };
        reader.readAsDataURL(file);
      });
    }

    function deleteProjectFile(projectId, fileIndex) {
      const project = getProject(projectId);
      if (!project || !project.files) return;
      project.files.splice(fileIndex, 1);
      saveData();
      render();
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function findGoalById(goalId) {
      if (!data.goals) return null;
      for (const g of data.goals) {
        if (g.id === goalId) return g;
        if (g.children) {
          for (const mid of g.children) {
            if (mid.id === goalId) return mid;
            if (mid.children) {
              for (const sm of mid.children) {
                if (sm.id === goalId) return sm;
              }
            }
          }
        }
      }
      return null;
    }

    function findTodoNodeByPath(ids) {
      if (!data.todos || ids.length === 0) return null;
      let nodes = data.todos;
      let current = null;
      for (const id of ids) {
        current = nodes.find(n => n.id === id);
        if (!current) return null;
        nodes = current.children || [];
      }
      return current;
    }

      parent.children.push({id: Date.now(), name: name, children: []});

      render();
    }

      html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">' + statusIcon;
      html += '<h1 class="todo-detail-title" style="margin:0;font-size:18px">' + escapeHtml(t.title) + '</h1></div>';
      html += '<div style="font-size:12px;color:var(--fg-muted);margin-bottom:16px">' + dateLabel + '</div>';
      // Memo
      html += '<div><label class="label" style="font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:6px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> メモ</label>';
      html += '<textarea class="textarea" placeholder="メモを入力..." style="min-height:240px;font-size:14px;line-height:1.8" onblur="saveDailyMemo(\'' + dateStr + '\',' + id + ',this.value)">' + escapeHtml(t.memo || '') + '</textarea></div>';
      // Actions
      html += '<div class="todo-detail-actions">';
      if (t.done) {
        html += '<button class="todo-detail-action-btn undo" onclick="toggleDailyTask(\'' + dateStr + '\',' + id + ');navigate(\'daily-detail\',{date:\'' + dateStr + '\',id:' + id + '})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> 未完了に戻す</button>';
      } else {
        html += '<button class="todo-detail-action-btn check" onclick="toggleDailyTask(\'' + dateStr + '\',' + id + ');navigate(\'daily-detail\',{date:\'' + dateStr + '\',id:' + id + '})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> 完了にする</button>';
      }
      html += '<button class="todo-detail-action-btn delete" onclick="if(confirm(\'このタスクを削除しますか？\')){deleteDailyTask(\'' + dateStr + '\',' + id + ');navigate(\'todos\')}">' + icons.trash + ' 削除する</button>';
      html += '</div></div>';
      el.innerHTML = html;
    }

    // TODO DETAIL SCREEN
    function renderTodoDetail(el) {
      const path = pageParams.path;
      if (!path) { navigate('todos'); return; }
      const node = findNodeByPath(path);
      if (!node) { navigate('todos'); return; }

      let html = '<div class="todo-detail-screen">';
      html += renderBreadcrumb();
      html += '<div class="todo-detail-header">';
      html += '<button class="todo-detail-back" onclick="navigate(\'todos\')">' + icons.arrowLeft + ' 今日のタスクに戻る</button>';

      // For category (depth 0) nodes, add + button in top right
      if (node.type === 'category' || node.type === 'subcategory' || node.type === 'node') {
        html += '<button class="todo-detail-action-btn add" onclick="showAddChildDialog(\'' + path + '\',' + (path.split(',').length - 1) + ')">' + icons.plus + ' 子を追加</button>';
      }
      html += '</div>';

      if (node.type === 'task') {
        // Task detail
        var projectPath = getTaskProjectPath(path);
        var statusIcon = node.done
          ? '<span style="color:#059669;font-size:24px">' + icons.check + '</span>'
          : '<span style="color:var(--primary);font-size:24px"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg></span>';
        html += '<div style="display:flex;align-items:center;gap:16px;margin-bottom:8px">' + statusIcon;
        html += '<h1 class="todo-detail-title" style="margin:0">' + escapeHtml(node.title) + '</h1></div>';

        if (projectPath) {
          html += '<div style="margin-bottom:12px;font-size:12px;color:var(--fg-muted2)">' + icons.folder + ' ' + escapeHtml(projectPath) + '</div>';
        }

        if (node.done) {
          html += '<div style="margin-bottom:16px"><span class="badge badge-secondary" style="font-size:12px;padding:4px 12px;background:#d1fae5;color:#059669">完了済み</span></div>';
        }

        html += '<div class="todo-detail-info">';
        html += '<div class="todo-detail-info-row"><span class="todo-detail-info-label">' + icons.users + ' 担当者</span><span style="font-weight:500">' + escapeHtml(node.assignee || '未割当') + '</span></div>';
        html += '<div class="todo-detail-info-row"><span class="todo-detail-info-label">' + icons.clock + ' 期限</span><span style="font-weight:500">' + escapeHtml(node.dueDay || '期限なし') + '</span></div>';
        html += '</div>';

        // Sub-tasks
        if (node.children && node.children.length > 0) {
          html += '<div style="margin-top:20px"><label class="label" style="font-size:14px;margin-bottom:8px">子タスク</label>';
          node.children.forEach(function(child) {
            if (child.type === 'task') {
              var childPath = path + ',' + child.id;
              html += '<div class="todo-item' + (child.done ? ' done' : '') + '" style="margin:0;border:none;padding:3px 0">';
              html += '<div class="todo-checkbox ' + (child.done ? 'checked' : '') + '" onclick="event.stopPropagation();completeTask(\'' + childPath + '\');navigate(\'todo-detail\',{path:\'' + path + '\'})" style="width:22px;height:22px">' + (child.done ? icons.check : '<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg>') + '</div>';
              html += '<div style="flex:1;min-width:0;cursor:pointer" onclick="navigate(\'todo-detail\',{path:\'' + childPath + '\'})">';
              html += '<div class="todo-title">' + escapeHtml(child.title) + '</div>';
              html += '</div></div>';
            }
          });
          html += '</div>';
        }

        // Add sub-task button
        html += '<div style="margin-top:8px"><button class="daily-add" onclick="addSubTask(\'' + path + '\')" style="display:inline-flex;font-size:12px;padding:4px 0">' + icons.plus + ' 子タスクを追加</button></div>';

        // Memo
        html += '<div style="margin-top:20px"><label class="label" style="font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:6px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> メモ</label>';
        html += '<textarea class="textarea" id="todo-memo" placeholder="メモを入力..." style="min-height:240px;font-size:14px;line-height:1.8" onblur="saveTodoMemo(\'' + path + '\',this.value)">' + escapeHtml(node.memo || '') + '</textarea></div>';

        // Action buttons
        html += '<div class="todo-detail-actions">';
        if (node.done) {
          html += '<button class="todo-detail-action-btn undo" onclick="completeTask(\'' + path + '\');navigate(\'todo-detail\',{path:\'' + path + '\'})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> 未完了に戻す</button>';
        } else {
          html += '<button class="todo-detail-action-btn check" onclick="completeTask(\'' + path + '\');navigate(\'todo-detail\',{path:\'' + path + '\'})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> 完了にする</button>';
        }
        html += '<button class="todo-detail-action-btn delete" onclick="if(confirm(\'このタスクを削除しますか？\')){deleteTaskFromPopup(\'' + path + '\');navigate(\'todos\')}">' + icons.trash + ' 削除する</button>';
        html += '</div>';

      } else {
        // Category/subcategory/node detail
        var title = node.goalId ? getGoalTitle(node.goalId) : (node.title || '(ノード)');
        var counts = countTasks(node);

        html += '<h1 class="todo-detail-title">' + icons.target + ' ' + escapeHtml(title) + '</h1>';
        html += '<div class="todo-detail-meta">';
        html += '<span class="badge badge-secondary">' + counts.done + '/' + counts.total + ' 完了</span>';
        html += '</div>';

        // Show children as a list
        if (node.children && node.children.length > 0) {
          html += '<div class="goal-detail-children">';
          node.children.forEach(function(child) {
            var childPath = path + ',' + child.id;
            if (child.type === 'task') {
              var doneClass = child.done ? ' style="opacity:.5;text-decoration:line-through"' : '';
              var icon = child.done
                ? '<span style="color:#059669">' + icons.check + '</span>'
                : '<span style="color:var(--primary)"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="8,5 19,12 8,19"/></svg></span>';
              html += '<div class="goal-detail-child" onclick="navigate(\'todo-detail\',{path:\'' + childPath + '\'})">';
              html += '<div style="display:flex;align-items:center;gap:12px">' + icon + '<span' + doneClass + '>' + escapeHtml(child.title) + '</span></div>';
              html += '<span class="text-xs" style="color:var(--fg-muted)">' + escapeHtml(child.assignee || '') + '</span>';
              html += '</div>';
            } else {
              var childTitle = child.goalId ? getGoalTitle(child.goalId) : (child.title || '(ノード)');
              var childCounts = countTasks(child);
              html += '<div class="goal-detail-child" onclick="navigate(\'todo-detail\',{path:\'' + childPath + '\'})">';
              html += '<div style="display:flex;align-items:center;gap:8px">' + icons.folder + '<span style="font-weight:500">' + escapeHtml(childTitle) + '</span></div>';
              html += '<span class="badge badge-outline">' + childCounts.done + '/' + childCounts.total + '</span>';
              html += '</div>';
            }
          });
          html += '</div>';
        } else {
          html += '<div class="empty" style="margin-top:24px"><p>まだ子要素がありません</p></div>';
        }

        // Action buttons
        html += '<div class="todo-detail-actions">';
        html += '<button class="todo-detail-action-btn add" onclick="showAddChildDialog(\'' + path + '\',' + (path.split(',').length - 1) + ')">' + icons.plus + ' 子を追加</button>';
        html += '<button class="todo-detail-action-btn delete" onclick="if(confirm(\'このノードを削除しますか？\')){deleteTodoNodeByPath(\'' + path + '\');navigate(\'todos\')}">' + icons.trash + ' 削除する</button>';
        html += '</div>';
      }

      html += '</div>';
      el.innerHTML = html;
    }

    // GOAL DETAIL SCREEN
    function renderGoalDetail(el) {
      var goalId = pageParams.goalId;
      var type = pageParams.type;
      if (!goalId) { navigate('goals'); return; }

      var goal = null;
      var parentLarge = null;
      var parentMid = null;

      if (type === 'large') {
        goal = data.goals.find(function(g) { return g.id === goalId; });
      } else if (type === 'mid') {
        parentLarge = data.goals.find(function(g) { return g.id === pageParams.parentLargeId; });
        if (parentLarge) goal = (parentLarge.children || []).find(function(m) { return m.id === goalId; });
      } else if (type === 'small') {
        parentLarge = data.goals.find(function(g) { return g.id === pageParams.parentLargeId; });
        if (parentLarge) {
          parentMid = (parentLarge.children || []).find(function(m) { return m.id === pageParams.parentMidId; });
          if (parentMid) goal = (parentMid.children || []).find(function(s) { return s.id === goalId; });
        }
      }

      if (!goal) { navigate('goals'); return; }

      var html = '<div class="goal-detail-screen">';
      html += renderBreadcrumb();
      html += renderBreadcrumb();
      html += '<div class="todo-detail-header">';
      html += '<button class="todo-detail-back" onclick="navigate(\'goals\')">' + icons.arrowLeft + ' 目的ツリーに戻る</button>';

      // For large goals, + button in top-right
      if (type === 'large') {
        html += '<button class="todo-detail-action-btn add" onclick="showAddGoalDialog(\'mid\',' + goalId + ')">' + icons.plus + ' 中目的を追加</button>';
      } else if (type === 'mid') {
        html += '<button class="todo-detail-action-btn add" onclick="showAddGoalDialog(\'small\',' + pageParams.parentLargeId + ',' + goalId + ')">' + icons.plus + ' 小目的を追加</button>';
      }
      html += '</div>';

      var typeLabel = type === 'large' ? '大目的' : type === 'mid' ? '中目的' : '小目的';
      html += '<div style="margin-bottom:8px"><span class="badge badge-primary">' + typeLabel + '</span></div>';
      html += '<h1 class="todo-detail-title">' + icons.target + ' ' + escapeHtml(goal.title) + '</h1>';

      // Show children if any
      if (goal.children && goal.children.length > 0) {
        html += '<div class="goal-detail-children" style="margin-top:24px">';
        goal.children.forEach(function(child) {
          var childType = type === 'large' ? 'mid' : 'small';
          var childLabel = childType === 'mid' ? '中目的' : '小目的';
          html += '<div class="goal-detail-child" onclick="navigate(\'goal-detail\',{goalId:' + child.id + ',type:\'' + childType + '\',parentLargeId:' + (type === 'large' ? goalId : pageParams.parentLargeId) + (childType === 'small' ? ',parentMidId:' + goalId : '') + '})">';
          html += '<div style="display:flex;align-items:center;gap:8px"><span class="badge badge-outline" style="font-size:10px">' + childLabel + '</span><span style="font-weight:500">' + escapeHtml(child.title) + '</span></div>';
          if (child.children && child.children.length > 0) {
            html += '<span class="text-xs" style="color:var(--fg-muted)">' + child.children.length + ' 子目的</span>';
          }
          html += '</div>';
        });
        html += '</div>';
      } else if (type !== 'small') {
        html += '<div class="empty" style="margin-top:24px"><p>子目的がまだありません</p></div>';
      }

      // Action buttons
      html += '<div class="todo-detail-actions">';
      if (type === 'large') {
        html += '<button class="todo-detail-action-btn add" onclick="showAddGoalDialog(\'mid\',' + goalId + ')">' + icons.plus + ' 中目的を追加</button>';
      } else if (type === 'mid') {
        html += '<button class="todo-detail-action-btn add" onclick="showAddGoalDialog(\'small\',' + pageParams.parentLargeId + ',' + goalId + ')">' + icons.plus + ' 小目的を追加</button>';
      }
      html += '<button class="todo-detail-action-btn delete" onclick="if(confirm(\'この目的を削除しますか？\')){deleteGoal(' + goalId + ',\'' + type + '\'';
      if (type === 'mid') html += ',' + pageParams.parentLargeId;
      if (type === 'small') html += ',' + pageParams.parentLargeId + ',' + pageParams.parentMidId;
      html += ');navigate(\'goals\')}">' + icons.trash + ' 削除する</button>';

      // Check button for marking as complete (for small goals)
      if (type === 'small') {
        html += '<button class="todo-detail-action-btn check" onclick="toast(\'目的を達成済みにしました\');navigate(\'goals\')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> 達成済みにする</button>';
      }

      html += '</div>';
      html += '</div>';
      el.innerHTML = html;
    }

    // Card tap-to-show-delete handler (for mobile)
    document.addEventListener('click', function(e) {
      var card = e.target.closest('.card');
      if (card && card.querySelector('.card-delete-btn')) {
        // If clicking the delete button itself, don't toggle
        if (e.target.closest('.card-delete-btn')) return;
        // Toggle show-delete on this card
        var wasShowing = card.classList.contains('show-delete');
        // Close all other show-delete cards
        document.querySelectorAll('.card.show-delete').forEach(function(c) { c.classList.remove('show-delete'); });
        if (!wasShowing) card.classList.add('show-delete');
      } else {
        // Clicked outside - close all
        document.querySelectorAll('.card.show-delete').forEach(function(c) { c.classList.remove('show-delete'); });
      }
    });
    // INIT - check for public manual view first
    (function() {
      var main = document.getElementById('main-area');
      var urlParams = new URLSearchParams(location.search);
      if (urlParams.get('manual')) {
        main.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px"><div style="width:36px;height:36px;border-radius:8px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700">N</div><div style="font-size:13px;color:var(--fg-muted)">読み込み中...</div></div>';
        renderPublicManual();
        return;
      }
      // Normal app: render from localStorage immediately (initSync runs in the
      // background via setTimeout and may skip its own re-render when editing a
      // manual — so this initial render is the one that actually paints the UI).
      render();
    })();
  
    // (legacy addCopyBtn / scanBlocks removed — decorateCopyBlocks handles all copy buttons now)
    </script>
</body>
</html>
