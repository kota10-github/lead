document.getElementById('btn').addEventListener('click', function() {
  var btn = this;
  btn.disabled = true;
  print('リモートデータを取得中...');
  fetch('/api/sync').then(function(r) { return r.json(); }).then(function(remote) {
    if (!remote || !remote.manuals) { print('データ取得失敗', 'err'); btn.disabled = false; return; }
    print('マニュアル ' + remote.manuals.length + '件 取得');
    var manual = remote.manuals.find(function(m) { return m.title === '入会対応' || m.id === 5; });
    if (!manual) {
      print('「入会対応」マニュアルが見つかりません。先にアプリで作成してください。', 'err');
      btn.disabled = false;
      return;
    }
    print('対象マニュアル: ID=' + manual.id + ' / ' + manual.title);
    // Initialize history array if missing
    if (!manual.history) manual.history = [];
    // Save previous version to history
    if (manual.taskRoadmap) {
      manual.history.push({ ts: Date.now(), content: manual.taskRoadmap, label: 'インポート前' });
    }
    manual.taskRoadmap = CONTENT;
    remote._syncTs = Date.now();
    print('リモートへ書き込み中...');
    fetch('/api/sync', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(remote)
    }).then(function(r) { return r.json(); }).then(function() {
      print('完了 ✓ アプリに戻って確認してください', 'ok');
    }).catch(function(e) {
      print('書き込み失敗: ' + e, 'err');
      btn.disabled = false;
    });
  }).catch(function(e) {
    print('取得失敗: ' + e, 'err');
    btn.disabled = false;
  });
});
</script>
